<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chambre — Porte vers le couloir</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a0806; }
        #gc { display:block; width:100%; height:calc(100vh - 70px); cursor:crosshair; }

        #hud {
            position:fixed; bottom:0; left:0; right:0; height:70px;
            background:#1a1814; display:flex; align-items:center;
            justify-content:space-around; padding:0 16px; gap:12px; z-index:10;
            border-top:1px solid #333;
        }
        #info { color:#999; font-family:Georgia,serif; font-size:11px; text-align:center; line-height:1.8; letter-spacing:0.5px; }
        #jL, #jR { cursor:pointer; touch-action:none; border-radius:8px; background:#111; }

        #paramBar {
            position:fixed; top:10px; left:50%; transform:translateX(-50%);
            z-index:100; display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
        }
        .pBtn {
            background:rgba(15,12,8,0.88); border:1px solid #4a3a20;
            border-radius:20px; padding:5px 14px; font-size:11px;
            letter-spacing:1px; color:#a08050; cursor:pointer;
            font-family:'Courier New',monospace; transition:all 0.2s;
            backdrop-filter:blur(4px); white-space:nowrap; user-select:none;
        }
        .pBtn:hover { border-color:#8a6030; color:#d4b060; }
        .pBtn.active { background:rgba(40,25,5,0.95); border-color:#c09040; color:#f0d080; }
        .pBtn .icon { margin-right:5px; }

        #toast {
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            background:#1a3a1a; color:#80e080; border:1px solid #3a8040;
            border-radius:20px; padding:6px 18px; font-size:11px;
            font-family:'Courier New',monospace; letter-spacing:1px;
            opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200;
        }
        #toast.show { opacity:1; }

        #exitBtn {
            position:fixed; top:18px; right:18px;
            background:rgba(20,14,8,0.88); border:1px solid #5a4030;
            border-radius:30px; padding:6px 16px; color:#c8b890; font-size:13px;
            cursor:pointer; z-index:60; transition:0.3s; backdrop-filter:blur(4px);
            font-family:Georgia,serif;
        }
        #exitBtn:hover { background:#3a2818; border-color:#8a6a48; color:#f0e0c8; }

        #coordPanel {
            display:none;
            position:fixed; top:10px; left:10px; z-index:100;
            background:rgba(15,12,8,0.88); border:1px solid #4a3a20;
            border-radius:8px; padding:8px 12px;
            font-family:'Courier New',monospace; font-size:12px;
            color:#d4b870; line-height:1.7;
            backdrop-filter:blur(4px); min-width:180px;
        }
        .coord-title { font-size:10px; letter-spacing:2px; color:#8a7040; text-transform:uppercase; margin-bottom:4px; }
        .coord-val { color:#f0d080; font-size:13px; font-weight:bold; }
        #copyBtn {
            margin-top:6px; width:100%; background:#2a1e08; border:1px solid #6a5020;
            color:#d4b060; font-size:10px; letter-spacing:1px; padding:4px 0;
            border-radius:4px; cursor:pointer; font-family:'Courier New',monospace;
            transition:all 0.2s;
        }
        #copyBtn:hover { background:#3a2e18; }
        #copyBtn.copied { background:#1a3a1a; color:#80d080; border-color:#3a8040; }

        #minimap {
            display:none;
            position:fixed; top:10px; right:10px; z-index:100;
        }
        #minimapCanvas {
            border-radius:8px; border:1px solid #4a3a20; display:block;
            background:rgba(15,12,8,0.88);
        }
        #minimapLabel {
            text-align:center; font-size:9px; letter-spacing:1.5px;
            color:#8a7040; font-family:'Courier New',monospace; margin-top:3px;
            text-transform:uppercase;
        }

        #inventoryUI {
            position:fixed; top:60px; left:50%; transform:translateX(-50%);
            width:min(90vw, 520px);
            background:rgba(15,10,5,0.97); border:2px solid #8a6030;
            border-radius:14px; padding:18px 20px;
            font-family:'Courier New',monospace; color:#e8d8b0;
            display:none; z-index:200; backdrop-filter:blur(6px);
            max-height:70vh; overflow-y:auto;
        }
        #inventoryUI .inv-title { font-size:14px; color:#d4a040; font-weight:bold; margin-bottom:12px; letter-spacing:1px; }
        #inventoryUI .inv-sub { font-size:11px; color:#a08050; margin-bottom:10px; }
        #inventoryUI .inv-items { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
        #inventoryUI .inv-bag { display:flex; flex-wrap:wrap; gap:8px; min-height:36px; }
        #inventoryUI .inv-btn {
            background:#1e1408; border:1px solid #6a4820; color:#e8c880;
            font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer;
            font-family:'Courier New',monospace; transition:all 0.15s;
        }
        #inventoryUI .inv-btn:hover { background:#3a2810; }
        #inventoryUI .inv-btn-bag {
            background:#0e1e08; border:1px solid #3a6020; color:#a0e060;
            font-size:12px; padding:5px 10px; border-radius:8px; cursor:pointer;
            font-family:'Courier New',monospace;
        }
        #inventoryUI .inv-btn-bag:hover { background:#1a2a10; }
        #inventoryUI .inv-close {
            margin-top:14px; background:#2a1e08; border:1px solid #8a6030;
            color:#d4b060; font-size:11px; letter-spacing:1px; padding:6px 18px;
            border-radius:8px; cursor:pointer; font-family:'Courier New',monospace;
        }
        #inventoryUI .inv-close:hover { background:#3a2a0a; color:#f0d080; border-color:#a07030; }
        #inventoryUI .inv-empty { color:#6a5a3a; font-size:11px; }
    </style>
</head>
<body>

    <canvas id="gc"></canvas>

    <div id="paramBar">
        <button class="pBtn" id="btnCoords" onclick="toggleCoords()"><span class="icon">📍</span>Coordonnées</button>
        <button class="pBtn" id="btnMap" onclick="toggleMap()"><span class="icon">🗺️</span>Carte</button>
        <button class="pBtn" id="btnFly" onclick="toggleFly()"><span class="icon">🪂</span>Vol</button>
        <button class="pBtn" id="btnCall" onclick="callSurveillant()"><span class="icon">📞</span>Appeler</button>
        <button class="pBtn" id="btnItem" onclick="toggleInventory()"><span class="icon">🎒</span>Objets</button>
    </div>

    <div id="coordPanel">
        <div class="coord-title">📍 Position 3D</div>
        <div>X : <span class="coord-val" id="cx">0.00</span></div>
        <div>Z : <span class="coord-val" id="cz">0.00</span></div>
        <div>Y : <span class="coord-val" id="cy">1.70</span></div>
        <button id="copyBtn" onclick="copyCoords()">⧉ COPIER</button>
    </div>

    <div id="minimap">
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
        <div id="minimapLabel">Plan</div>
    </div>

    <div id="hud">
        <canvas id="jL" width="120" height="60"></canvas>
        <div id="info">ZQSD · avancer &nbsp;|&nbsp; clic-glisser · regarder<br>Chambre — Porte vers le couloir</div>
        <canvas id="jR" width="120" height="60"></canvas>
    </div>

    <button id="exitBtn" onclick="window.location.href='out.html'">🚪 Retour extérieur</button>
    <div id="toast">✓ Sauvegardé</div>

    <div id="inventoryUI">
        <div class="inv-title">🎒 INVENTAIRE</div>
        <div class="inv-sub">Cliquez sur un objet pour le prendre.</div>
        <div id="invItemList" class="inv-items"></div>
        <div style="font-size:13px;color:#d4a040;font-weight:bold;margin-bottom:8px;margin-top:4px;">📦 Dans mon sac :</div>
        <div id="invBagList" class="inv-bag"></div>
        <button class="inv-close" onclick="toggleInventory()">✕ Fermer</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        //  CHAMBRE AVEC PORTE INTERACTIVE (charnière gauche)
        //  Détection du paramètre from=corridor
        //  Position à (5.55, 1.7, 7.2) et regard vers -Z (intérieur)
        // ═══════════════════════════════════════════════════════════════

        if (typeof THREE === 'undefined') {
            document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Erreur : Three.js ne s\'est pas chargé.</h1>';
            throw new Error('THREE not loaded');
        }

        const canvas = document.getElementById('gc');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setClearColor(0x1a1410);
        renderer.setSize(window.innerWidth, window.innerHeight - 70);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1410, 20, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight - 70), 0.1, 60);

        // ─── Détection de provenance ────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const fromCorridor = urlParams.get('from') === 'corridor';

        let camYaw, camPitch;
        if (fromCorridor) {
            camera.position.set(5.55, 1.7, 7.2);
            camYaw = Math.PI;          // regard vers -Z (intérieur de la chambre)
            camPitch = 0.1;
        } else {
            camera.position.set(0, 1.6, 6.5);
            camYaw = 0;
            camPitch = 0.1;
        }

        // ─── Lumières ──────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x887868, 0.6);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffe8c0, 0.9);
        sun.position.set(4, 10, 3);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024;
        sun.shadow.mapSize.height = 1024;
        sun.shadow.camera.near = 0.1;
        sun.shadow.camera.far = 20;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x8899bb, 0.3);
        fill.position.set(-4, 2, -3);
        scene.add(fill);

        // ─── Textures ──────────────────────────────────────────────────
        function makeTex(fn, size) {
            size = size || 128;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            fn(ctx, size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        const stoneTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#b8a888';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < 60; i++) {
                const x = Math.random() * s,
                    y = Math.random() * s;
                const r = 180 + Math.random() * 40,
                    g = 160 + Math.random() * 30,
                    b = 130 + Math.random() * 30;
                ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
                ctx.fillRect(x, y, 6 + Math.random() * 14, 6 + Math.random() * 12);
            }
            ctx.strokeStyle = 'rgba(80,70,55,0.12)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < s; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 128);
        stoneTex.repeat.set(3, 3);

        const floorTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#4a3828';
            ctx.fillRect(0, 0, s, s);
            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 10; col++) {
                    const v = 70 + Math.random() * 30;
                    ctx.fillStyle = 'rgb(' + (v + 20) + ',' + (v - 10) + ',' + (v - 30) + ')';
                    ctx.fillRect(col * 12 + 1, row * 12 + 1, 10, 10);
                }
            }
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= s; i += 12) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 120);
        floorTex.repeat.set(8, 8);

        const woodTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#5a3a20';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < s; i += 3) {
                ctx.fillStyle = 'hsl(28,' + (25 + Math.random() * 15) + '%,' + (20 + Math.random() * 12) + '%)';
                ctx.fillRect(0, i, s, 2);
            }
        }, 64);
        woodTex.repeat.set(4, 4);

        // ─── Matériaux ──────────────────────────────────────────────────
        const mWall = new THREE.MeshLambertMaterial({ map: stoneTex, color: 0xddd0b8 });
        const mFloor = new THREE.MeshLambertMaterial({ map: floorTex, color: 0x6a5848 });
        const mWood = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x7a5a38 });
        const mGlass = new THREE.MeshLambertMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.2, side: THREE
                .DoubleSide });
        const mCeil = new THREE.MeshLambertMaterial({ color: 0xddd0c0 });
        const mDoor = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x6a4a30 });
        const mHandle = new THREE.MeshLambertMaterial({ color: 0xccaa88 });
        const mDoorFrame = new THREE.MeshLambertMaterial({ color: 0x4a3a2a });
        const mDoorHighlight = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x8a6a50, emissive: 0x442200,
            emissiveIntensity: 0.3 });

        // ─── Helpers ──────────────────────────────────────────────────
        function box(w, h, d, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        function plane(w, h, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            scene.add(m);
            return m;
        }

        function cylinder(rt, rb, h, seg, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.castShadow = true;
            scene.add(m);
            return m;
        }

        // ─── Dimensions ──────────────────────────────────────────────
        const WALL_H = 3.6;
        const ROOM_W = 16;
        const ROOM_D = 16;

        // ─── Sol ──────────────────────────────────────────────────────
        plane(ROOM_W + 2, ROOM_D + 2, mFloor, 0, -0.01, 0, -Math.PI / 2);

        // ─── Murs (sauf avant) ──────────────────────────────────────
        plane(ROOM_W, WALL_H, mWall, 0, WALL_H / 2, -ROOM_D / 2, 0, 0);
        plane(ROOM_D, WALL_H, mWall, -ROOM_W / 2, WALL_H / 2, 0, 0, Math.PI / 2);
        plane(ROOM_D, WALL_H, mWall, ROOM_W / 2, WALL_H / 2, 0, 0, -Math.PI / 2);

        // ─── Mur avant (z positif) avec fenêtre et porte ──────────
        (function() {
            const fw = 2.8, fh = 2.0;
            const doorW = 1.2, doorH = 2.2;
            const doorX = ROOM_W / 2 - 1.8;
            const fz = ROOM_D / 2 + 0.01;
            const yc = WALL_H / 2;

            // Découpage du mur
            const xMin = -ROOM_W / 2, xMax = ROOM_W / 2;
            const yMin = 0, yMax = WALL_H;

            box(-fw/2 - xMin, WALL_H, 0.05, mWall, (xMin + (-fw/2)) / 2, WALL_H/2, fz);
            const xGap1 = fw/2, xGap2 = doorX - doorW/2;
            if (xGap2 > xGap1) {
                const w = xGap2 - xGap1;
                box(w, WALL_H, 0.05, mWall, (xGap1 + xGap2)/2, WALL_H/2, fz);
            }
            box(xMax - (doorX + doorW/2), WALL_H, 0.05, mWall, (doorX + doorW/2 + xMax)/2, WALL_H/2, fz);

            const yTop = Math.max(yc + fh/2, doorH);
            if (yMax > yTop) {
                box(ROOM_W, yMax - yTop, 0.05, mWall, 0, (yTop + yMax)/2, fz);
            }
            const yBotFen = yc - fh/2;
            if (yBotFen > yMin) {
                box(fw, yBotFen - yMin, 0.05, mWall, 0, (yMin + yBotFen)/2, fz);
            }
            if (yTop > doorH) {
                box(doorW, yTop - doorH, 0.05, mWall, doorX, (doorH + yTop)/2, fz);
            }

            // Fenêtre
            const mGlass2 = new THREE.MeshLambertMaterial({ color: 0x88bbdd, transparent: true, opacity: 0.35, side: THREE
                    .DoubleSide });
            plane(fw, fh, mGlass2, 0, yc, fz + 0.01);
            const frameMat = new THREE.MeshLambertMaterial({ color: 0x4a3828 });
            [
                [fw + 0.2, 0.06, 0, fh / 2],
                [fw + 0.2, 0.06, 0, -fh / 2],
                [0.06, fh + 0.2, -fw / 2, 0],
                [0.06, fh + 0.2, fw / 2, 0]
            ].forEach(function(opt) {
                box(opt[0], opt[1], 0.05, frameMat, opt[2], yc + opt[3], fz + 0.02);
            });
            box(fw, 0.04, 0.05, frameMat, 0, yc, fz + 0.02);
            box(0.04, fh, 0.05, frameMat, 0, yc, fz + 0.02);

            // ─── PORTE INTERACTIVE (charnière gauche) ──────────────
            const doorZ = ROOM_D / 2 + 0.02;
            const frameMatDoor = mDoorFrame;
            box(0.08, doorH, 0.08, frameMatDoor, doorX - doorW/2 - 0.04, doorH/2 + 0.025, doorZ);
            box(0.08, doorH, 0.08, frameMatDoor, doorX + doorW/2 + 0.04, doorH/2 + 0.025, doorZ);
            box(doorW + 0.16, 0.08, 0.08, frameMatDoor, doorX, doorH + 0.025 + 0.04, doorZ);

            const pivot = new THREE.Group();
            pivot.position.set(doorX - doorW/2, doorH/2 + 0.025, doorZ);
            scene.add(pivot);

            const doorGroup = new THREE.Group();
            doorGroup.position.set(doorW/2, 0, 0);

            const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(doorW, doorH, 0.04), mDoor);
            doorMesh.position.set(0, 0, 0);
            doorMesh.castShadow = true;
            doorMesh.receiveShadow = true;
            doorGroup.add(doorMesh);

            const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), mHandle);
            handle.position.set(0.35, -0.2, 0.06);
            handle.castShadow = true;
            doorGroup.add(handle);
            const handleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.12, 6), mHandle);
            handleBase.rotation.x = Math.PI / 2;
            handleBase.position.set(0.35, -0.2, 0.04);
            doorGroup.add(handleBase);

            const clickArea = new THREE.Mesh(new THREE.PlaneGeometry(doorW * 1.2, doorH * 1.2),
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide }));
            clickArea.position.set(0, 0, 0.02);
            clickArea.userData.isClickArea = true;
            doorGroup.add(clickArea);

            pivot.add(doorGroup);

            window._doorPivot = pivot;
            window._doorGroup = doorGroup;
            window._doorMesh = doorMesh;
            window._doorMat = mDoor;
            window._doorHighlightMat = mDoorHighlight;
            window._doorOpen = false;
            window._doorAnimating = false;
        })();

        // ─── Plafond ──────────────────────────────────────────────────
        plane(ROOM_W, ROOM_D, mCeil, 0, WALL_H, 0, Math.PI / 2);

        // ─── Ampoule ──────────────────────────────────────────────────
        const lampMat = new THREE.MeshLambertMaterial({ color: 0x3a2a1a });
        cylinder(0.15, 0.22, 0.4, 10, lampMat, 0, WALL_H - 0.2, 0);
        const bulbLight = new THREE.PointLight(0xffe8c0, 0.8, 8);
        bulbLight.position.set(0, WALL_H - 0.5, 0);
        scene.add(bulbLight);
        const bulbMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8),
            new THREE.MeshBasicMaterial({ color: 0xffe8a0 }));
        bulbMesh.position.set(0, WALL_H - 0.5, 0);
        scene.add(bulbMesh);
  // ─── DÉTECTION DU CHEMIN (local vs en ligne) ───
function getVideoPath() {
    const hostname = window.location.hostname;
    if (hostname === 'localhost' || hostname === '127.0.0.1') {
        return '/projet/BYD/videos/thethingsthatiwoulddo.mp4'; // ← chemin XAMPP
    } else {
        return 'videos/thethingsthatiwoulddo.mp4'; // ← chemin GitHub (relatif)
    }
}

// ─── TÉLÉVISION VINTAGE AVEC VIDÉO (CHEMIN ADAPTATIF) ───
function createVintageTV() {
    const group = new THREE.Group();

    // ---- MEUBLE AVEC PIEDS ----
    const shelfMat = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.08, 0.9), shelfMat);
    shelf.position.set(0, 0.30, 0);
    shelf.castShadow = true;
    shelf.receiveShadow = true;
    group.add(shelf);

    const legMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
    const legPositions = [
        [-0.65, 0.15, -0.35],
        [0.65, 0.15, -0.35],
        [-0.65, 0.15, 0.35],
        [0.65, 0.15, 0.35]
    ];
    legPositions.forEach(pos => {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.30, 6), legMat);
        leg.position.set(pos[0], pos[1], pos[2]);
        leg.castShadow = true;
        group.add(leg);
    });

    // ---- CORPS DE LA TÉLÉ ----

    // ---- CADRE DE L'ÉCRAN ----
    const frameMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

    // ---- BOUTONS ----
    const knobMat = new THREE.MeshStandardMaterial({

    for (let i = -0.4; i <= 0.4; i += 0.4) {

    // ---- ANTENNES ----
    const antMat = new THREE.MeshStandardMaterial({

    const start1 = new THREE.Vector3(-0.30, 1.20, 0.1);
    const end1 = new THREE.Vector3(-0.40, 1.90, 0.15);
    const mid1 = new THREE.Vector3().addVectors(start1, end1).multiplyScalar(0.5);
    const dir1 = new THREE.Vector3().subVectors(end1, start1);

    });

    ball1.position.copy(end1);
    group.add(ball1);

    const start2 = new THREE.Vector3(0.30, 1.20, 0.1);
    const end2 = new THREE.Vector3(0.40, 1.90, 0.15);
    const mid2 = new THREE.Vector3().addVectors(start2, end2).multiplyScalar(0.5);
    const dir2 = new THREE.Vector3().subVectors(end2, start2);
    const len2 = dir2.length();
    dir2.normalize();
    const ant2 = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, len2, 4), antMat);
    ant2.position.copy(mid2);

    console.log('📺 Télévision vintage ajoutée.');
}

createVintageTV();
        // ─── Contrôles ──────────────────────────────────────────────────
        let mdown = false,
            lmx = 0,
            lmy = 0;
        const keys = {};

        document.addEventListener('keydown', function(e) {
            keys[e.key.toLowerCase()] = true;
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].indexOf(e.key.toLowerCase()) !== -1) e
                .preventDefault();
        });
        document.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', function(e) { mdown = true;
            lmx = e.clientX;
            lmy = e.clientY;
            canvas.style.cursor = 'grabbing'; });
        document.addEventListener('mouseup', function() { mdown = false;
            canvas.style.cursor = 'default'; });
        document.addEventListener('mousemove', function(e) {
            if (!mdown) return;
            camYaw -= (e.clientX - lmx) * 0.004;
            camPitch -= (e.clientY - lmy) * 0.003;
            camPitch = Math.max(-0.5, Math.min(0.6, camPitch));
            lmx = e.clientX;
            lmy = e.clientY;
        });

        // ─── Raycaster pour la porte ──────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoverDoor = false;
        let doorHighlighted = false;

        function updateDoorInteraction(event) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const pivot = window._doorPivot;
            if (!pivot) return;
            const doorGroup = window._doorGroup;
            const meshes = [];
            doorGroup.children.forEach(child => {
                if (child.isMesh && (child === window._doorMesh || child.userData.isClickArea)) {
                    meshes.push(child);
                }
            });
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                canvas.style.cursor = 'pointer';
                if (!doorHighlighted && !window._doorOpen) {
                    window._doorMesh.material = mDoorHighlight;
                    doorHighlighted = true;
                }
                hoverDoor = true;
            } else {
                canvas.style.cursor = 'crosshair';
                if (doorHighlighted) {
                    window._doorMesh.material = mDoor;
                    doorHighlighted = false;
                }
                hoverDoor = false;
            }
        }

        canvas.addEventListener('mousemove', updateDoorInteraction);

        canvas.addEventListener('click', function(event) {
            if (!hoverDoor || window._doorOpen || window._doorAnimating) return;
            openDoor();
        });

        function openDoor() {
            if (window._doorOpen || window._doorAnimating) return;
            window._doorAnimating = true;
            showToast('🚪 La porte s\'ouvre...');

            const pivot = window._doorPivot;
            const targetAngle = -Math.PI / 2;
            const duration = 800;
            const startTime = performance.now();
            const startRot = 0;

            function animateDoor(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const currentAngle = startRot + (targetAngle - startRot) * eased;
                pivot.rotation.y = currentAngle;

                if (progress < 1) {
                    requestAnimationFrame(animateDoor);
                } else {
                    pivot.rotation.y = targetAngle;
                    window._doorOpen = true;
                    window._doorAnimating = false;
                    setTimeout(function() {
                        window.location.href = 'corridor.html';
                    }, 500);
                }
            }
            requestAnimationFrame(animateDoor);
        }

        // ─── Joysticks ──────────────────────────────────────────────────
        let jLx = 0,
            jLy = 0,
            jRx = 0,
            jRy = 0;

        function setupJoy(id, onMove) {
            const cv = document.getElementById(id);
            let active = false,
                ox = 0,
                oy = 0;

            function s(x, y) { active = true;
                ox = x;
                oy = y; }

            function mv(x, y) {
                if (!active) return;
                let dx = (x - ox) / 45,
                    dy = (y - oy) / 22;
                const mg = Math.sqrt(dx * dx + dy * dy);
                if (mg > 1) { dx /= mg;
                    dy /= mg; }
                onMove(dx, dy);
            }

            function e() { active = false;
                onMove(0, 0); }
            cv.addEventListener('mousedown', function(ev) { const r = cv.getBoundingClientRect();
                s(ev.clientX - r.left, ev.clientY - r.top); });
            document.addEventListener('mousemove', function(ev) { if (active) { const r = cv.getBoundingClientRect();
                    mv(ev.clientX - r.left, ev.clientY - r.top); } });
            document.addEventListener('mouseup', e);
            cv.addEventListener('touchstart', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                s(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchmove', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                mv(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchend', e);
        }
        setupJoy('jL', function(dx, dy) { jLx = dx;
            jLy = dy; });
        setupJoy('jR', function(dx, dy) { jRx = dx;
            jRy = dy; });

        function drawJoy(id, dx, dy) {
            const cv = document.getElementById(id);
            const x2 = cv.getContext('2d');
            const W = 120,
                H = 60;
            x2.clearRect(0, 0, W, H);
            x2.fillStyle = '#1e1e1e';
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#444';
            x2.lineWidth = 1.5;
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.stroke();
            const nx = W / 2 + dx * 38,
                ny = H / 2 + dy * 16;
            const g2 = x2.createRadialGradient(nx - 2, ny - 2, 1, nx, ny, 13);
            g2.addColorStop(0, '#888');
            g2.addColorStop(1, '#2a2a2a');
            x2.fillStyle = g2;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#111';
            x2.lineWidth = 1;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.stroke();
        }

        // ─── Boutons ──────────────────────────────────────────────────────
        let showCoords = false,
            showMap = false,
            flyMode = false,
            flySpeed = 8;

        function toggleCoords() {
            showCoords = !showCoords;
            document.getElementById('coordPanel').style.display = showCoords ? 'block' : 'none';
            document.getElementById('btnCoords').classList.toggle('active', showCoords);
        }

        function toggleMap() {
            showMap = !showMap;
            document.getElementById('minimap').style.display = showMap ? 'block' : 'none';
            document.getElementById('btnMap').classList.toggle('active', showMap);
            if (showMap) drawMinimap();
        }

        function toggleFly() {
            flyMode = !flyMode;
            var btn = document.getElementById('btnFly');
            btn.classList.toggle('active', flyMode);
            btn.innerHTML = flyMode ? '<span class="icon">🪂</span>Vol ON' : '<span class="icon">🪂</span>Vol';
            if (!flyMode) camera.position.y = 1.7;
        }

        function copyCoords() {
            var x = camera.position.x.toFixed(2),
                y = camera.position.y.toFixed(2),
                z = camera.position.z.toFixed(2);
            var txt = 'X:' + x + ' Y:' + y + ' Z:' + z;
            var doToast = function() {
                showToast('✓ ' + txt + ' copié !');
                var btn = document.getElementById('copyBtn');
                btn.textContent = '✓ COPIÉ !';
                btn.classList.add('copied');
                setTimeout(function() { btn.textContent = '⧉ COPIER';
                    btn.classList.remove('copied'); }, 2000);
            };
            if (navigator.clipboard) {
                navigator.clipboard.writeText(txt).then(doToast).catch(function() {
                    var el = document.createElement('textarea');
                    el.value = txt;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    doToast();
                });
            } else {
                var el = document.createElement('textarea');
                el.value = txt;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                doToast();
            }
        }

        function updateCoordDisplay() {
            if (!showCoords) return;
            document.getElementById('cx').textContent = camera.position.x.toFixed(2);
            document.getElementById('cz').textContent = camera.position.z.toFixed(2);
            document.getElementById('cy').textContent = camera.position.y.toFixed(2);
        }

        function drawMinimap() {
            if (!showMap) return;
            var mc = document.getElementById('minimapCanvas');
            var ctx = mc.getContext('2d');
            var W = 180,
                H = 180;
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1a1408';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#4a3828';
            ctx.fillRect(10, 10, 160, 160);
            ctx.fillStyle = '#6a5848';
            ctx.fillRect(20, 20, 140, 140);
            ctx.fillStyle = '#3a6a2a';
            ctx.fillRect(40, 40, 100, 100);
            ctx.strokeStyle = '#6a5020';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(1, 1, W - 2, H - 2);
            var px = 90,
                pz = 90;
            ctx.fillStyle = '#ff5020';
            ctx.beginPath();
            ctx.moveTo(px, pz - 8);
            ctx.lineTo(px - 5, pz + 5);
            ctx.lineTo(px + 5, pz + 5);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#88aadd';
            ctx.fillRect(140, 70, 10, 30);
            ctx.font = '7px Courier New';
            ctx.fillStyle = '#88aadd';
            ctx.fillText('🚪', 138, 82);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        // ─── INVENTAIRE ──────────────────────────────────────────────
        const playerInventory = [];
        const ITEMS_AVAILABLE = [
            { id: 'crayon', name: '✏️ Crayon', desc: 'Un crayon HB bien taillé.' },
            { id: 'gomme', name: '🧹 Gomme', desc: 'Une gomme blanche.' },

            invOpen = !invOpen;

        function renderInventory() {
            const list = document.getElementById('invItemList');
            const bag = document.getElementById('invBagList');
            list.innerHTML = '';
            bag.innerHTML = '';

            ITEMS_AVAILABLE.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'inv-btn';
                btn.textContent = item.name;
                btn.title = item.desc;
                btn.onclick = () => {
                    playerInventory.push({ ...item });
                    showToast('✓ ' + item.name + ' ajouté !');
                    renderInventory();
                };
                list.appendChild(btn);
            });

            if (playerInventory.length === 0) {
                const span = document.createElement('span');
                span.className = 'inv-empty';
                span.textContent = 'Sac vide';
                bag.appendChild(span);
            } else {
                playerInventory.forEach((item, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'inv-btn-bag';
                    btn.textContent = item.name + ' ✕';

        // ─── Boucle ──────────────────────────────────────────────────────
        var lastTime = 0;
        var SPEED = 4.5;

        function loop(time) {
            var dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            var fx = 0,
                fz = 0;
            if (keys['z'] || keys['arrowup']) fz = 1;
            if (keys['s'] || keys['arrowdown']) fz = -1;
            if (keys['q'] || keys['arrowleft']) fx = -1;
            if (keys['d'] || keys['arrowright']) fx = 1;
            fx += jLx;
            fz -= jLy;

            if (jRx !== 0) camYaw -= jRx * 0.12;

            if (flyMode) {
                if (jRy > 0.05) camera.position.y -= flySpeed * dt * jRy;
                else if (jRy < -0.05) camera.position.y -= flySpeed * dt * jRy;
                camera.position.y = Math.max(0.5, Math.min(20, camera.position.y));
            } else {
                if (jRy !== 0) {
                    camPitch += jRy * 2 * dt;
                    camPitch = Math.max(-0.5, Math.min(0.6, camPitch));
                }
                camera.position.y = 1.7;
            }

            var cos = Math.cos(camYaw),
                sin = Math.sin(camYaw);
            camera.position.x += (-fx * cos + fz * sin) * SPEED * dt;
            camera.position.z += (fx * sin + fz * cos) * SPEED * dt;

            var margin = 0.8;
            camera.position.x = Math.max(-ROOM_W / 2 + margin, Math.min(ROOM_W / 2 - margin, camera.position.x));
            camera.position.z = Math.max(-ROOM_D / 2 + margin, Math.min(ROOM_D / 2 - margin, camera.position.z));

            updateCoordDisplay();

            var dir = new THREE.Vector3(
                Math.sin(camYaw) * Math.cos(camPitch),
                -Math.sin(camPitch),
                Math.cos(camYaw) * Math.cos(camPitch)
            );
            camera.lookAt(camera.position.x + dir.x, camera.position.y + dir.y, camera.position.z + dir.z);

            renderer.render(scene, camera);
            drawJoy('jL', jLx, jLy);
            drawJoy('jR', jRx, jRy);
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', function() {
            var w = window.innerWidth,
                h = window.innerHeight - 70;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });

        renderInventory();
        requestAnimationFrame(loop);
        console.log('🛏️ Chambre avec porte interactive — prête');
