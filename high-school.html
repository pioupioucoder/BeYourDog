// ─── Fonction de construction de PNJ générique (style anime low-poly) ───
function buildNPC(group, sex, skinColor, hairColor, outfit) {
  const mSkinNPC  = new THREE.MeshLambertMaterial({color:skinColor});
  const mHairNPC  = new THREE.MeshLambertMaterial({color:hairColor});

  // Bassin/jambes
  const hipMat = outfit.pants;
  const mb2 = (w,h,d,mat,x,y,z) => {
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z); m.castShadow=true; group.add(m); return m;
  };
  const ms2 = (r,mat,x,y,z) => {
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);
    m.position.set(x,y,z); m.castShadow=true; group.add(m); return m;
  };
  const mc2 = (rt,rb,h,seg,mat,x,y,z,rx=0) => {
    const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
    m.position.set(x,y,z); m.rotation.x=rx; m.castShadow=true; group.add(m); return m;
  };

  const scale = 1.48; // même taille que M. Bernard
  const S = scale;

  // Jambes
  mb2(0.18*S, 0.48*S, 0.20*S, hipMat, -0.11*S, 0.24*S, 0);
  mb2(0.18*S, 0.48*S, 0.20*S, hipMat,  0.11*S, 0.24*S, 0);
  // Chaussures noires
  const mShoe = new THREE.MeshLambertMaterial({color:0x111111});
  mb2(0.20*S, 0.11*S, 0.28*S, mShoe, -0.11*S, 0.05*S, 0.04*S);
  mb2(0.20*S, 0.11*S, 0.28*S, mShoe,  0.11*S, 0.05*S, 0.04*S);

  // Si fille : ajouter jupe au-dessus des jambes
  if(sex === 'f' && outfit.skirt) {
    // Jupe (forme tronc de cône légèrement évasée)
    const mSkirtMat = outfit.skirt;
    mc2(0.24*S, 0.28*S, 0.40*S, 8, mSkirtMat, 0, 0.55*S, 0);
  }

  // Bassin
  mb2(0.44*S, 0.18*S, 0.24*S, hipMat, 0, 0.58*S, 0);

  // Torse / chemise
  mb2(0.48*S, 0.52*S, 0.26*S, outfit.shirt, 0, 0.96*S, 0);
  // Col/cravate/ruban
  if(outfit.tie) {
    mb2(0.06*S, 0.20*S, 0.05*S, outfit.tie, 0, 1.12*S, 0.13*S);
  }

  // Bras
  [-1,1].forEach(side=>{
    mb2(0.13*S, 0.36*S, 0.14*S, outfit.shirt, side*0.29*S, 0.85*S, 0);
    mb2(0.11*S, 0.30*S, 0.12*S, mSkinNPC,    side*0.29*S, 0.60*S, 0);
    // Main
    ms2(0.065*S, mSkinNPC, side*0.29*S, 0.44*S, 0);
  });

  // Cou
  mc2(0.08*S, 0.09*S, 0.15*S, 8, mSkinNPC, 0, 1.24*S, 0);

  // Tête
  const headG = new THREE.Group();
  headG.position.set(0, 1.40*S, 0);
  group.add(headG);

  const hb = (w,h,d,mat,x,y,z) => {
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z); m.castShadow=true; headG.add(m); return m;
  };
  const hs = (r,mat,x,y,z) => {
    const m=new THREE.Mesh(new THREE.SphereGeometry(r,8,6),mat);
    m.position.set(x,y,z); m.castShadow=true; headG.add(m); return m;
  };

  // Crâne
  hs(0.17*S, mSkinNPC, 0, 0.02*S, 0);
  // Visage
  hb(0.30*S, 0.33*S, 0.28*S, mSkinNPC, 0, 0.01*S, 0);
  // Yeux (grands, style anime)
  const mEyeWhite = new THREE.MeshLambertMaterial({color:0xffffff});
  const mEyePupil = new THREE.MeshLambertMaterial({color:outfit.eyeColor||0x1a1010});
  [-1,1].forEach(side=>{
    hb(0.09*S, 0.09*S, 0.04*S, mEyeWhite, side*0.088*S, 0.04*S, 0.14*S);
    hb(0.055*S, 0.07*S, 0.04*S, mEyePupil,  side*0.088*S, 0.035*S, 0.148*S);
  });
  // Bouche
  hb(0.08*S, 0.022*S, 0.04*S, new THREE.MeshLambertMaterial({color:0xc06040}), 0, -0.09*S, 0.145*S);
  // Nez
  hs(0.025*S, mSkinNPC, 0, -0.03*S, 0.145*S);
  // Oreilles
  hs(0.04*S, mSkinNPC, -0.16*S, 0.01*S, 0);
  hs(0.04*S, mSkinNPC,  0.16*S, 0.01*S, 0);

  // Cheveux (style anime selon sexe)
  hb(0.32*S, 0.12*S, 0.30*S, mHairNPC, 0, 0.18*S, -0.01*S); // dessus
  hb(0.32*S, 0.22*S, 0.08*S, mHairNPC, 0, 0.08*S, -0.155*S); // arrière
  if(sex === 'f') {
    // Cheveux longs pour les filles
    hb(0.28*S, 0.35*S, 0.08*S, mHairNPC, 0, -0.12*S, -0.155*S); // chevelure longue
    // Mèches latérales
    hb(0.09*S, 0.45*S, 0.12*S, mHairNPC, -0.17*S, -0.08*S, -0.02*S);
    hb(0.09*S, 0.45*S, 0.12*S, mHairNPC,  0.17*S, -0.08*S, -0.02*S);
  } else {
    // Cheveux courts garçon
    hb(0.32*S, 0.08*S, 0.10*S, mHairNPC, 0, 0.08*S, -0.05*S); // nuque
    // Mèche avant
    hb(0.14*S, 0.08*S, 0.08*S, mHairNPC, 0, 0.20*S, 0.12*S);
  }

  // Accessoires spéciaux (lunettes, barbe, foulard)
  if(outfit.glasses) {
    const mGl = new THREE.MeshLambertMaterial({color:0x3a3a3a});
    [-1,1].forEach(side=>{
      const frame = new THREE.Mesh(new THREE.TorusGeometry(0.04*S, 0.008*S, 6, 12), mGl);
      frame.rotation.y = Math.PI/2;
      frame.position.set(side*0.09*S, 0.04*S, 0.16*S);
      headG.add(frame);
    });
    hb(0.05*S, 0.006*S, 0.006*S, mGl, 0, 0.04*S, 0.18*S); // pont
  }
  if(outfit.beard) {
    hb(0.24*S, 0.10*S, 0.08*S, mHairNPC, 0, -0.12*S, 0.13*S);
  }
  if(outfit.scarf) {
    const mScarf = new THREE.MeshLambertMaterial({color:outfit.scarf});
    hb(0.22*S, 0.10*S, 0.22*S, mScarf, 0, 1.18*S, 0);
  }
  if(outfit.whiteHair) {
    // Recalibrer avec cheveux blancs
    hb(0.32*S, 0.12*S, 0.30*S, mHairNPC, 0, 0.18*S, -0.01*S);
  }
}

// ─── Mise à jour des PNJ dans la boucle de jeu ───────────────────────
// (appelé depuis la boucle principale via updateNPCs)
let _npcT = 0;
function updateNPCs(dt, ts) {
  _npcT += dt;
  const px = camera.position.x, pz = camera.position.z;
  const NPC_ANIM_RADIUS = 18; // seulement animer les PNJ proches pour les perfs

  nearStudentNPC = null;
  nearTeacherNPC = null;
  let closestDist = 3.0; // rayon d'interaction

  // Animer élèves
  studentNPCs.forEach((npc, i) => {
    const dx = npc.group.position.x - px;
    const dz = npc.group.position.z - pz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if(dist > NPC_ANIM_RADIUS) return;

    // Animation de balancement léger (idle)
    npc.idleTimer -= dt;
    if(npc.idleTimer < 0) {
      npc.idleTimer = 2 + Math.random()*4;
      npc.lookDir = Math.random()*Math.PI*2;
    }
    // Légère oscillation du corps
    const bob = Math.sin(ts * 0.001 * 0.8 + npc.bobPhase) * 0.015;
    npc.group.position.y = bob;
    // Rotation très lente de la tête (si groupe a un mesh tête on laisse la tête tranquille)
    const slowWave = Math.sin(ts * 0.0006 + npc.bobPhase) * 0.18;
    npc.group.rotation.y += (npc.lookDir - npc.group.rotation.y) * dt * 0.3;

    // Proximité joueur → regarde vers lui
    if(dist < 4.0) {
      const targetY = Math.atan2(px - npc.group.position.x, pz - npc.group.position.z);
      npc.group.rotation.y += (targetY - npc.group.rotation.y) * dt * 2;
    }
    if(dist < closestDist) {
      closestDist = dist;
      nearStudentNPC = npc;
    }
  });

  // Animer professeurs
  teacherNPCs.forEach((npc) => {
    const dx = npc.group.position.x - px;
    const dz = npc.group.position.z - pz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if(dist > NPC_ANIM_RADIUS) return;

    const bob = Math.sin(ts * 0.001 * 0.6 + npc.bobPhase) * 0.012;
    npc.group.position.y = bob;
    if(dist < 4.5) {
      const targetY = Math.atan2(px - npc.group.position.x, pz - npc.group.position.z);
      npc.group.rotation.y += (targetY - npc.group.rotation.y) * dt * 1.5;
    }
    if(dist < closestDist) {
      closestDist = dist;
      nearTeacherNPC = npc;
      nearStudentNPC = null; // priorité au prof
    }
  });

  // Afficher l'indice d'interaction
  const anyNear = nearStudentNPC || nearTeacherNPC;
  if(anyNear && !npcDialogOpen && !inDialogue) {
    const npcName = nearStudentNPC ? nearStudentNPC.data.name :
                    nearTeacherNPC ? nearTeacherNPC.data.name : '';
    npcHint.textContent = '[E] Parler à ' + npcName;
    npcHint.style.display = 'block';
    talkBtn.style.display = 'block';
  } else if(!npcDialogOpen) {
    npcHint.style.display = 'none';
    talkBtn.style.display = 'none';
  }
}

// Patch dans la boucle principale — appel à updateNPCs dans loop()
// (inséré ici car on ne peut pas modifier loop() directement sans risque)
// On surcharge requestAnimationFrame pour injecter notre logique
const _origRAF = window.requestAnimationFrame;
let _rafInjected = false;
(function injectNPCUpdate(){
  // On attend que la boucle loop existe, puis on patch en ajoutant un hook
  // Solution : intercepter le tickAutoSpeech pour rajouter updateNPCs juste après
  const _origTickAutoSpeech = window.tickAutoSpeech;
  if(typeof tickAutoSpeech !== 'undefined') {
    // tickAutoSpeech est global, on l'enveloppe
    const __orig = tickAutoSpeech;
    window.tickAutoSpeech = function(dt) {
      __orig(dt);
      try { updateNPCs(dt, performance.now()); } catch(e){}
    };
  }
})();

requestAnimationFrame(loop);
</script>
