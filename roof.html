<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toit de l'Ascenseur — Nuit Éternelle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #gc { display: block; width: 100%; height: calc(100vh - 70px); cursor: crosshair; }
        #hud {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: #1a1814; display: flex; align-items: center;
            justify-content: space-around; padding: 0 16px; gap: 12px; z-index: 10;
            border-top: 1px solid #333;
        }
        #info { color: #999; font-family: Georgia, serif; font-size: 11px; text-align: center; line-height: 1.8; letter-spacing: 0.5px; }
        #jL, #jR { cursor: pointer; touch-action: none; border-radius: 8px; background: #111; }

        #paramBar {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .pBtn {
            background: rgba(15,12,8,0.88); border: 1px solid #4a3a20; border-radius: 20px;
            padding: 5px 14px; font-size: 11px; letter-spacing: 1px; color: #a08050;
            cursor: pointer; font-family: 'Courier New', monospace; transition: all 0.2s;
            backdrop-filter: blur(4px); white-space: nowrap; user-select: none;
        }
        .pBtn:hover { border-color: #8a6030; color: #d4b060; }
        .pBtn.active { background: rgba(40,25,5,0.95); border-color: #c09040; color: #f0d080; }
        .pBtn .icon { margin-right: 5px; }

        #coordPanel {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            background: rgba(15,12,8,0.88); border: 1px solid #4a3a20;
            border-radius: 8px; padding: 8px 12px; font-family: 'Courier New', monospace;
            font-size: 12px; color: #d4b870; line-height: 1.7; backdrop-filter: blur(4px);
            min-width: 180px; display: none;
        }
        #coordPanel .coord-title { font-size: 10px; letter-spacing: 2px; color: #8a7040; text-transform: uppercase; margin-bottom: 4px; }
        #coordPanel .coord-val { color: #f0d080; font-size: 13px; font-weight: bold; }
        #copyBtn {
            margin-top: 6px; width: 100%; background: #2a1e08; border: 1px solid #6a5020;
            color: #d4b060; font-size: 10px; letter-spacing: 1px; padding: 4px 0;
            border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        #copyBtn:hover { background: #3a2a0a; color: #f0d080; border-color: #a07030; }
        #copyBtn.copied { background: #1a3a1a; color: #80d080; border-color: #3a8040; }

        #minimap {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: none;
        }
        #minimapCanvas {
            border-radius: 8px; border: 1px solid #4a3a20;
            display: block; background: rgba(15,12,8,0.88);
        }
        #minimapLabel {
            text-align: center; font-size: 9px; letter-spacing: 1.5px;
            color: #8a7040; font-family: 'Courier New', monospace;
            margin-top: 3px; text-transform: uppercase;
        }

        #toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: #1a3a1a; color: #80e080; border: 1px solid #3a8040;
            border-radius: 20px; padding: 6px 18px; font-size: 11px;
            font-family: 'Courier New', monospace; letter-spacing: 1px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200;
        }

        #inventoryUI {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            width: min(90vw, 520px); background: rgba(15,10,5,0.97);
            border: 2px solid #8a6030; border-radius: 14px; padding: 18px 20px;
            font-family: 'Courier New', monospace; color: #e8d8b0;
            display: none; z-index: 200; backdrop-filter: blur(6px);
            max-height: 70vh; overflow-y: auto;
        }
        #inventoryUI .inv-title { font-size: 14px; color: #d4a040; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; }
        #inventoryUI .inv-sub { font-size: 11px; color: #a08050; margin-bottom: 10px; }
        #inventoryUI .inv-items { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        #inventoryUI .inv-bag { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; }
        #inventoryUI .inv-btn {
            background: #1e1408; border: 1px solid #6a4820; color: #e8c880;
            font-size: 12px; padding: 6px 12px; border-radius: 8px; cursor: pointer;
            font-family: 'Courier New', monospace; transition: all 0.15s;
        }
        #inventoryUI .inv-btn:hover { background: #3a2810; }
        #inventoryUI .inv-btn-bag {
            background: #0e1e08; border: 1px solid #3a6020; color: #a0e060;
            font-size: 12px; padding: 5px 10px; border-radius: 8px; cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        #inventoryUI .inv-btn-bag:hover { background: #1a2a10; }
        #inventoryUI .inv-close {
            margin-top: 14px; background: #2a1e08; border: 1px solid #8a6030;
            color: #d4b060; font-size: 11px; letter-spacing: 1px;
            padding: 6px 18px; border-radius: 8px; cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        #inventoryUI .inv-close:hover { background: #3a2a0a; color: #f0d080; border-color: #a07030; }
        #inventoryUI .inv-empty { color: #6a5a3a; font-size: 11px; }

        @media(max-width:600px) {
            #paramBar .pBtn { font-size: 9px; padding: 3px 8px; }
            #jL, #jR { width: 80px !important; height: 44px !important; }
            #coordPanel { font-size: 10px; min-width: 140px; padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <canvas id="gc"></canvas>

    <div id="paramBar">
        <button class="pBtn" id="btnCoords" onclick="toggleCoords()"><span class="icon">📍</span>Coords</button>
        <button class="pBtn" id="btnMap" onclick="toggleMap()"><span class="icon">🗺️</span>Carte</button>
        <button class="pBtn" id="btnFly" onclick="toggleFly()"><span class="icon">🪂</span>Vol</button>
        <button class="pBtn" id="btnCall" onclick="callElevator()"><span class="icon">📞</span>Appel</button>
        <button class="pBtn" id="btnItem" onclick="toggleInventory()"><span class="icon">🎒</span>Items</button>
    </div>

    <div id="coordPanel">
        <div class="coord-title">📍 Position 3D</div>
        <div>X : <span class="coord-val" id="cx">0.00</span></div>
        <div>Z : <span class="coord-val" id="cz">0.00</span></div>
        <div>Y : <span class="coord-val" id="cy">1.70</span></div>
        <button id="copyBtn" onclick="copyCoords()">⧉ COPIER</button>
    </div>

    <div id="minimap">
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
        <div id="minimapLabel">Toit</div>
    </div>

    <div id="toast">✓ Copié !</div>

    <div id="hud">
        <canvas id="jL" width="120" height="60"></canvas>
        <div id="info">🕹️ Gauche · déplacement &nbsp;|&nbsp; Droit · regard<br />Toit — Nuit éternelle</div>
        <canvas id="jR" width="120" height="60"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        // TOIT DE L'ASCENSEUR — Nuit étoilée, étoiles filantes synchronisées
        // Inspiré de high-school.html (terrasse + grillage) + out.html (ciel nocturne)
        // ═══════════════════════════════════════════════════════════════

        const canvas = document.getElementById('gc');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor(0x080a18);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.0));

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x080a18, 0.0006);

        const camera = new THREE.PerspectiveCamera(65, 1, 0.1, 4000);
        camera.position.set(16, 3.5, -130);

        function resize() {
            const w = window.innerWidth,
                h = window.innerHeight - 70;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── LIGHTING ────────────────────────────────────────────────────
        const moonLight = new THREE.DirectionalLight(0x4466aa, 0.35);
        moonLight.position.set(-30, 60, 40);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        moonLight.shadow.camera.left = -80;
        moonLight.shadow.camera.right = 80;
        moonLight.shadow.camera.top = 80;
        moonLight.shadow.camera.bottom = -80;
        moonLight.shadow.camera.near = 1;
        moonLight.shadow.camera.far = 300;
        moonLight.shadow.bias = -0.001;
        scene.add(moonLight);

        const ambLight = new THREE.AmbientLight(0x223355, 0.40);
        scene.add(ambLight);
        const hemiLight = new THREE.HemisphereLight(0x4466aa, 0x1a1a2a, 0.25);
        scene.add(hemiLight);

        // ─── TEXTURES ────────────────────────────────────────────────────
        function makeTex(fn, size = 128) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const x = c.getContext('2d');
            fn(x, size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        const paveTex = makeTex((x, s) => {
            x.fillStyle = '#3a3a3a';
            x.fillRect(0, 0, s, s);
            const cell = s / 4;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const dark = (r + c) % 2 === 0;
                    x.fillStyle = dark ? '#4a4a4a' : '#2a2a2a';
                    x.save();
                    x.translate(c * cell + cell / 2, r * cell + cell / 2);
                    x.rotate(Math.PI / 4);
                    const d = cell * 0.6;
                    x.fillRect(-d / 2, -d / 2, d, d);
                    x.restore();
                }
            }
            x.strokeStyle = 'rgba(80,70,60,0.15)';
            x.lineWidth = 1;
            for (let i = 0; i <= s; i += cell) {
                x.beginPath();
                x.moveTo(i, 0);
                x.lineTo(i, s);
                x.stroke();
                x.beginPath();
                x.moveTo(0, i);
                x.lineTo(s, i);
                x.stroke();
            }
        }, 128);
        paveTex.repeat.set(6, 6);

        const mDalle = new THREE.MeshLambertMaterial({ map: paveTex });
        const mAcro = new THREE.MeshLambertMaterial({ color: 0x4a4e54 });
        const mPost = new THREE.MeshLambertMaterial({ color: 0x667788 });
        const mPostTop = new THREE.MeshLambertMaterial({ color: 0x8899aa });
        const mGrill = new THREE.MeshLambertMaterial({
            color: 0x3a6a3a,
            transparent: true,
            opacity: 0.55,
            side: THREE.DoubleSide
        });

        // ─── CONSTRUCTION DU TOIT ─────────────────────────────────────
        const ROOF_X1 = 6,
            ROOF_X2 = 26;
        const ROOF_Z1 = -145,
            ROOF_Z2 = -120;
        const ROOF_W = ROOF_X2 - ROOF_X1;
        const ROOF_D = Math.abs(ROOF_Z2 - ROOF_Z1);
        const ROOF_CX = (ROOF_X1 + ROOF_X2) / 2;
        const ROOF_CZ = (ROOF_Z1 + ROOF_Z2) / 2;
        const Y_BASE = 15; // hauteur du toit (troisième étage)

        // Dalle
        const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(ROOF_W, ROOF_D), mDalle);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.set(ROOF_CX, Y_BASE + 0.05, ROOF_CZ);
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        // Acrotère (muret bas tout autour)
        const acH = 0.5,
            acT = 0.35;
        const mAcro2 = new THREE.MeshLambertMaterial({ color: 0x4a4e54 });
        // avant
        box(ROOF_W + acT * 2, acH, acT, mAcro2, ROOF_CX, Y_BASE + acH / 2, ROOF_Z2);
        // fond
        box(ROOF_W + acT * 2, acH, acT, mAcro2, ROOF_CX, Y_BASE + acH / 2, ROOF_Z1);
        // gauche
        box(acT, acH, ROOF_D + acT * 2, mAcro2, ROOF_X1, Y_BASE + acH / 2, ROOF_CZ);
        // droite
        box(acT, acH, ROOF_D + acT * 2, mAcro2, ROOF_X2, Y_BASE + acH / 2, ROOF_CZ);

        // ─── GRILLAGE STYLE ANIMÉ ─────────────────────────────────────
        const FENCE_H = 2.2;
        const POST_STEP = 2.0;

        // Texture grillage losangé (adaptée)
        function makeChainLinkTex(cellPx = 16) {
            const s = 256,
                gc = document.createElement('canvas');
            gc.width = gc.height = s;
            const gx = gc.getContext('2d');
            gx.clearRect(0, 0, s, s);
            gx.strokeStyle = 'rgba(120,160,140,0.7)';
            gx.lineWidth = 2;
            const cp = cellPx;
            for (let i = -s; i < s * 2; i += cp) {
                gx.beginPath();
                gx.moveTo(i, 0);
                gx.lineTo(i + s, s);
                gx.stroke();
                gx.beginPath();
                gx.moveTo(i, 0);
                gx.lineTo(i - s, s);
                gx.stroke();
            }
            const t = new THREE.CanvasTexture(gc);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }
        const clTex = makeChainLinkTex(16);

        function makeFenceSegZ(x1, x2, z, baseY) {
            const w = x2 - x1;
            if (w < 0.1) return;
            const t = clTex.clone();
            t.repeat.set(w * 0.5, FENCE_H * 0.5);
            t.needsUpdate = true;
            const mat = new THREE.MeshLambertMaterial({ map: t, transparent: true, opacity: 0.85, side: THREE.DoubleSide,
                color: 0x5a8a5a });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, FENCE_H), mat);
            mesh.position.set((x1 + x2) / 2, baseY + acH + FENCE_H / 2, z);
            scene.add(mesh);
            // rail supérieur
            box(w, 0.06, 0.06, mPost, (x1 + x2) / 2, baseY + acH + FENCE_H, z);
            // poteaux
            for (let px = x1; px <= x2 + 0.1; px += POST_STEP) {
                const p = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, FENCE_H + acH, 7), mPost);
                p.position.set(px, baseY + (FENCE_H + acH) / 2, z);
                scene.add(p);
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.15, 7), mPostTop);
                tip.position.set(px, baseY + acH + FENCE_H + 0.075, z);
                scene.add(tip);
            }
        }

        function makeFenceSegX(x, z1, z2, baseY) {
            const d = Math.abs(z2 - z1);
            if (d < 0.1) return;
            const t = clTex.clone();
            t.repeat.set(d * 0.5, FENCE_H * 0.5);
            t.needsUpdate = true;
            const mat = new THREE.MeshLambertMaterial({ map: t, transparent: true, opacity: 0.85, side: THREE.DoubleSide,
                color: 0x5a8a5a });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(d, FENCE_H), mat);
            mesh.rotation.y = Math.PI / 2;
            mesh.position.set(x, baseY + acH + FENCE_H / 2, (z1 + z2) / 2);
            scene.add(mesh);
            box(0.06, 0.06, d, mPost, x, baseY + acH + FENCE_H, (z1 + z2) / 2);
            for (let pz = z1; pz >= z2 - 0.1; pz -= POST_STEP) {
                const p = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, FENCE_H + acH, 7), mPost);
                p.position.set(x, baseY + (FENCE_H + acH) / 2, pz);
                scene.add(p);
                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.15, 7), mPostTop);
                tip.position.set(x, baseY + acH + FENCE_H + 0.075, pz);
                scene.add(tip);
            }
        }

        // 4 côtés du grillage (avec une ouverture pour l'ascenseur sur le côté gauche)
        // Côté avant (Z = ROOF_Z2)
        makeFenceSegZ(ROOF_X1, ROOF_X2, ROOF_Z2, Y_BASE);
        // Côté fond (Z = ROOF_Z1)
        makeFenceSegZ(ROOF_X1, ROOF_X2, ROOF_Z1, Y_BASE);
        // Côté gauche (X = ROOF_X1) avec ouverture pour l'ascenseur (Z de -123.35 à -120.35)
        const elZ1 = -123.35,
            elZ2 = -120.35;
        makeFenceSegX(ROOF_X1, ROOF_Z2, elZ2, Y_BASE); // partie haute (vers l'avant)
        makeFenceSegX(ROOF_X1, elZ1, ROOF_Z1, Y_BASE); // partie basse (vers le fond)
        // Côté droit (X = ROOF_X2)
        makeFenceSegX(ROOF_X2, ROOF_Z2, ROOF_Z1, Y_BASE);

        // Poteaux d'angle
        function addCornerPost(x, z) {
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, FENCE_H + acH, 7), mPost);
            p.position.set(x, Y_BASE + (FENCE_H + acH) / 2, z);
            scene.add(p);
            const tip = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.18, 7), mPostTop);
            tip.position.set(x, Y_BASE + acH + FENCE_H + 0.09, z);
            scene.add(tip);
        }
        addCornerPost(ROOF_X1, ROOF_Z1);
        addCornerPost(ROOF_X1, ROOF_Z2);
        addCornerPost(ROOF_X2, ROOF_Z1);
        addCornerPost(ROOF_X2, ROOF_Z2);

        // ─── ASCENSEUR (porte sur le toit) ──────────────────────────
        // On place une porte côté gauche (X=ROOF_X1, Z milieu de l'ouverture)
        const doorX = ROOF_X1 + 0.2;
        const doorZ = (elZ1 + elZ2) / 2;
        const doorW = 1.6,
            doorH = 2.6;
        const mDoor = new THREE.MeshLambertMaterial({ color: 0x4a6a4a });
        const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, doorH, doorW), mDoor);
        doorMesh.position.set(doorX, Y_BASE + acH + doorH / 2, doorZ);
        scene.add(doorMesh);
        // Poignée
        const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.2, 6), new THREE
        .MeshLambertMaterial({ color: 0xcccccc }));
        handle.rotation.z = Math.PI / 2;
        handle.position.set(doorX + 0.06, Y_BASE + acH + doorH * 0.5, doorZ + 0.2);
        scene.add(handle);
        // Panneau "Ascenseur" au-dessus
        const signCanvas = document.createElement('canvas');
        signCanvas.width = 128;
        signCanvas.height = 48;
        const sCtx = signCanvas.getContext('2d');
        sCtx.fillStyle = '#0a0e18';
        sCtx.fillRect(0, 0, 128, 48);
        sCtx.fillStyle = '#88ccff';
        sCtx.font = 'bold 22px monospace';
        sCtx.textAlign = 'center';
        sCtx.textBaseline = 'middle';
        sCtx.fillText('⬆ ASC', 64, 26);
        const signTex = new THREE.CanvasTexture(signCanvas);
        const signMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.25),
            new THREE.MeshBasicMaterial({ map: signTex, side: THREE.DoubleSide }));
        signMesh.position.set(doorX - 0.05, Y_BASE + acH + doorH + 0.15, doorZ);
        signMesh.rotation.y = Math.PI / 2;
        scene.add(signMesh);

        // ─── DÉCORATIONS : bancs, plantes ────────────────────────────
        const mBench = new THREE.MeshLambertMaterial({ color: 0x6a5a3a });
        const mIron = new THREE.MeshLambertMaterial({ color: 0x2a2a3a });
        const mBush2 = new THREE.MeshLambertMaterial({ color: 0x1a2a12 });
        const mPot = new THREE.MeshLambertMaterial({ color: 0x5a4a2a });

        function bench(x, z, ry = 0) {
            const g = new THREE.Group();
            g.position.set(x, Y_BASE, z);
            g.rotation.y = ry;
            scene.add(g);
            function b(w, h, d, mat, px, py, pz) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                m.position.set(px, py, pz);
                m.castShadow = true;
                m.receiveShadow = true;
                g.add(m);
            }
            b(2.0, 0.08, 0.45, mBench, 0, 0.44, 0);
            b(2.0, 0.08, 0.45, mBench, 0, 0.36, 0);
            const back = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.45, 0.08), mBench);
            back.position.set(0, 0.72, -0.25);
            back.rotation.x = -0.18;
            back.castShadow = true;
            g.add(back);
            [-0.8, 0.8].forEach(dx => {
                [-0.18, 0.18].forEach(dz => {
                    b(0.07, 0.40, 0.07, mIron, dx, 0.20, dz);
                });
            });
        }

        function bush(x, z, sz = 1.0) {
            const bush = new THREE.Mesh(new THREE.SphereGeometry(1, 6, 4), mBush2);
            bush.scale.set(sz, sz * 0.6, sz);
            bush.position.set(x, Y_BASE + sz * 0.3, z);
            bush.castShadow = true;
            scene.add(bush);
        }

        function pottedPlant(x, z) {
            const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.20, 0.30, 8), mPot);
            pot.position.set(x, Y_BASE + 0.15, z);
            pot.castShadow = true;
            scene.add(pot);
            const plant = new THREE.Mesh(new THREE.SphereGeometry(0.25, 5, 4), new THREE.MeshLambertMaterial({ color: 0x1a4a1a }));
            plant.position.set(x, Y_BASE + 0.45, z);
            plant.castShadow = true;
            scene.add(plant);
        }

        // Placer quelques bancs et plantes
        bench(ROOF_CX - 3, ROOF_Z2 - 2, 0);
        bench(ROOF_CX + 3, ROOF_Z2 - 2, 0);
        bench(ROOF_CX, ROOF_Z1 + 2, Math.PI);
        bush(ROOF_X1 + 2, ROOF_Z1 + 3, 0.8);
        bush(ROOF_X2 - 2, ROOF_Z1 + 3, 0.8);

        function planShootingStarsForCycle(cycleNum) {
            const rand = Math.random();
            let count = 0;
            if (rand < 0.5) count = 0;
            else if (rand < 0.85) count = 1;
            else count = 2;
            if (count === 0) return;
            const offsets = [];
            for (let i = 0; i < count; i++) {

            }

        function spawnShootingStar() {
            const startX = (Math.random() - 0.5) * 800;
            const startY = 100 + Math.random() * 200;
            const startZ = (Math.random() - 0.5) * 800 - 200;
            const dir = new THREE.Vector3(
                (Math.random() - 0.5) * 0.6,
                -0.3 - Math.random() * 0.4,
                (Math.random() - 0.5) * 0.6
            ).normalize();
            const speed = 50 + Math.random() * 80;
            const points = [];
            const len = 20;
            for (let i = 0; i < len; i++) points.push(new THREE.Vector3(0, 0, 0));
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.9
            });
            const line = new THREE.Line(geom, mat);
            line.position.set(startX, startY, startZ);
            scene.add(line);
            const dotMat = new THREE.PointsMaterial({
                color: 0x88ccff,
                size: 2.5,
                transparent: true,
                opacity: 1
            });
            const dotGeo = new THREE.BufferGeometry();
            const dotPos = new Float32Array([0, 0, 0]);
            dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
            const dot = new THREE.Points(dotGeo, dotMat);
            line.add(dot);
            shootingStars.push({
                mesh: line,
                dot: dot,
                dir: dir,
                speed: speed,
                life: 0.4 + Math.random() * 0.3,
                age: 0,
                trail: points,
                len: len,
                active: true
            });
        }

        function updateShootingStars(dt, time) {
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                s.age += dt;
                if (s.age > s.life) {
                    scene.remove(s.mesh);
                    shootingStars.splice(i, 1);
                    continue;
                }
                const step = s.dir.clone().multiplyScalar(s.speed * dt);
                s.mesh.position.add(step);
                const pos = s.mesh.position;
                const trail = s.trail;
                for (let j = trail.length - 1; j > 0; j--) {
                    trail[j].copy(trail[j - 1]);
                }
                trail[0].copy(pos);
                s.mesh.geometry.setFromPoints(trail);
                s.mesh.geometry.attributes.position.needsUpdate = true;
                const alpha = 1 - (s.age / s.life);
                s.mesh.material.opacity = alpha * 0.9;
                s.dot.material.opacity = alpha;
            }

            const newCycle = Math.floor(moonAngle / (2 * Math.PI));
            if (newCycle !== currentCycle) {
                currentCycle = newCycle;
                planShootingStarsForCycle(currentCycle);
            }
            if (scheduledStars.has(currentCycle)) {
                const offsets = scheduledStars.get(currentCycle);
                const cycleTime = moonAngle % (2 * Math.PI) / MOON_ANGULAR_SPEED;
                if (!scheduledStars._triggered) scheduledStars._triggered = [];
                for (let off of offsets) {
                    if (cycleTime >= off && !scheduledStars._triggered.includes(off)) {
                        spawnShootingStar();
                        scheduledStars._triggered.push(off);
                    }
                }
                if (scheduledStars._triggered.length === offsets.length) {
                    scheduledStars.delete(currentCycle);
                }
            }
        }

        function setupJoy(id, onMove) {
            const cv = document.getElementById(id);
            let active = false,
                ox = 0,
                oy = 0;

            function s(x, y) { active = true;
                ox = x;
                oy = y; }

            function mv(x, y) {
                if (!active) return;
                let dx = (x - ox) / 45,
                    dy = (y - oy) / 22;
                const mg = Math.sqrt(dx * dx + dy * dy);
                if (mg > 1) { dx /= mg;
                    dy /= mg; }
                onMove(dx, dy);
            }

            function e() { active = false;
                onMove(0, 0); }
            cv.addEventListener('mousedown', ev => { const r = cv.getBoundingClientRect();
                s(ev.clientX - r.left, ev.clientY - r.top); });
            document.addEventListener('mousemove', ev => { if (active) { const r = cv.getBoundingClientRect();
                    mv(ev.clientX - r.left, ev.clientY - r.top); } });
            document.addEventListener('mouseup', e);
            cv.addEventListener('touchstart', ev => { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                s(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchmove', ev => { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                mv(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchend', e);
        }

            // Grillage (ligne)

            ctx.lineTo(-4, 4);
            ctx.lineTo(4, 4);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#88ddff';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();

            ctx.strokeStyle = '#4a3a20';
            ctx.lineWidth = 1.5;

            const time = ts / 1000;

            // Déplacement joystick gauche
            const speed = 12;
            let fx = jLx;
            let fz = -jLy;
            if (jRx !== 0) camYaw -= jRx * 0.12;
            if (!flyMode && jRy !== 0) {
                camPitch += jRy * 2 * dt;
                camPitch = Math.max(-0.6, Math.min(0.7, camPitch));
            }
            if (flyMode) {
                if (jRy > 0.05) camera.position.y -= flySpeed * dt * jRy;
                else if (jRy < -0.05) camera.position.y -= flySpeed * dt * jRy;
                camera.position.y = Math.max(0.5, Math.min(200, camera.position.y));
            }
            const cos = Math.cos(camYaw),
                sin = Math.sin(camYaw);
            let nx = camera.position.x + (-fx * cos + fz * sin) * speed * dt;
            let nz = camera.position.z + (fx * sin + fz * cos) * speed * dt;
            if (!flyMode) {
                camera.position.x = nx;
                camera.position.z = nz;
                camera.position.y = Y_BASE + 1.7;
            } else {
                camera.position.x = nx;
                camera.position.z = nz;
            }

            const dir = new THREE.Vector3(
                Math.sin(camYaw) * Math.cos(camPitch),
                -Math.sin(camPitch),
                Math.cos(camYaw) * Math.cos(camPitch)
            );
            camera.lookAt(camera.position.x + dir.x, camera.position.y + dir.y, camera.position.z + dir.z);

            // Nuages
            cloudTime += dt;
            const windOffset = new THREE.Vector2(
                WIND_DIR.x * WIND_SPEED * cloudTime,
                WIND_DIR.y * WIND_SPEED * cloudTime
            );
            clouds.forEach(c => {
                const baseX = c.baseX + windOffset.x;
                const baseZ = c.baseZ + windOffset.y;
                const oscX = Math.sin(cloudTime * c.oscFreq + c.phase) * c.oscAmp;
                const oscZ = Math.cos(cloudTime * c.oscFreq * 0.7 + c.phase * 1.3) * c.oscAmp * 0.6;
                c.group.position.x = baseX + oscX;
                c.group.position.z = baseZ + oscZ;
                c.group.rotation.y += dt * 0.003;
            });

            // Oiseaux
            birdFlock.forEach((b, i) => {
                b.angle += (b.speed * 0.006 + i * 0.001) * dt;
                b.x = Math.sin(b.angle * 0.7 + b.phase) * b.radius + camera.position.x;
                b.z = Math.cos(b.angle * 0.5 + b.phase) * b.radius + camera.position.z - 80;
                b.y = 20 + Math.sin(b.angle * 1.2) * 6 + i * 2.2;
                b.mesh.position.set(b.x, b.y, b.z);
                b.mesh.rotation.y = b.angle * 0.7 + b.phase + Math.PI / 2;
                b.wingPhase += dt * b.flapSpeed;
                const flap = Math.sin(b.wingPhase) * 0.45;
                b.lw.rotation.z = flap;
                b.rw.rotation.z = -flap;
            });

            // Lune
            moonAngle += MOON_ANGULAR_SPEED * dt;
            const moonRadius = 400;
            const moonHeight = 280;
            moonMesh.position.x = Math.sin(moonAngle) * moonRadius;
            moonMesh.position.z = Math.cos(moonAngle) * moonRadius - 300;
            moonMesh.position.y = moonHeight + Math.sin(moonAngle * 0.7) * 30;

            // Ciel suit le joueur
            skySphere.position.set(camera.position.x, 0, camera.position.z);
            starsMesh.position.set(camera.position.x, 0, camera.position.z);
            starsMeshBig.position.set(camera.position.x, 0, camera.position.z);

            // Scintillement des étoiles
            starTwinkle += dt;
            const twinkleFactor = 0.8 + 0.2 * Math.sin(starTwinkle * 0.5);
            starMat.opacity = 0.7 + 0.3 * twinkleFactor;
            starMatBig.opacity = 0.7 + 0.3 * Math.sin(starTwinkle * 0.7 + 1.2);
            starMat.size = 3.5 + 0.5 * Math.sin(starTwinkle * 0.3);
            starMatBig.size = 5.0 + 0.8 * Math.sin(starTwinkle * 0.4 + 0.5);

            // Étoiles filantes
            updateShootingStars(dt, time);

            // UI
            updateCoordDisplay();
            if (showMap && (ts - _lastMinimapT) > 200) {
                _lastMinimapT = ts;
                drawMinimap();
            }

            renderer.render(scene, camera);
            drawJoy('jL', jLx, jLy);
            drawJoy('jR', jRx, jRy);
            requestAnimationFrame(loop);
        }

        // ─── LANCEMENT ─────────────────────────────────────────────────
        requestAnimationFrame(loop);
    </script>
</body>
</html>
