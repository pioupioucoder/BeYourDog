<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corridor — Couloir du mystère</title>
    <style>
        /* ============================================================
           Interface identique à index.html
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0806;
        }
        #gc {
            display: block;
            width: 100%;
            height: calc(100vh - 70px);
            cursor: crosshair;
        }

        #hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #1a1814;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 16px;
            gap: 12px;
            z-index: 10;
            border-top: 1px solid #333;
        }
        #info {
            color: #999;
            font-family: Georgia, serif;
            font-size: 11px;
            text-align: center;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }
        #jL,
        #jR {
            cursor: pointer;
            touch-action: none;
            border-radius: 8px;
            background: #111;
        }

        #paramBar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pBtn {
            background: rgba(15, 12, 8, 0.88);
            border: 1px solid #4a3a20;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #a08050;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            user-select: none;
        }
        .pBtn:hover {
            border-color: #8a6030;
            color: #d4b060;
        }
        .pBtn.active {
            background: rgba(40, 25, 5, 0.95);
            border-color: #c09040;
            color: #f0d080;
        }
        .pBtn .icon {
            margin-right: 5px;
        }

        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3a1a;
            color: #80e080;
            border: 1px solid #3a8040;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
        }
        #toast.show {
            opacity: 1;
        }

        #exitBtn {
            position: fixed;
            top: 18px;
            right: 18px;
            background: rgba(20, 14, 8, 0.88);
            border: 1px solid #5a4030;
            border-radius: 30px;
            padding: 6px 16px;
            color: #c8b890;
            font-size: 13px;
            cursor: pointer;
            z-index: 60;
            transition: 0.3s;
            backdrop-filter: blur(4px);
            font-family: Georgia, serif;
        }
        #exitBtn:hover {
            background: #3a2818;
            border-color: #8a6a48;
            color: #f0e0c8;
        }

        #coordPanel {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(15, 12, 8, 0.88);
            border: 1px solid #4a3a20;
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #d4b870;
            line-height: 1.7;
            backdrop-filter: blur(4px);
            min-width: 180px;
        }
        .coord-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #8a7040;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .coord-val {
            color: #f0d080;
            font-size: 13px;
            font-weight: bold;
        }
        #copyBtn {
            margin-top: 6px;
            width: 100%;
            background: #2a1e08;
            border: 1px solid #6a5020;
            color: #d4b060;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 4px 0;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        #copyBtn:hover {
            background: #3a2e18;
        }
        #copyBtn.copied {
            background: #1a3a1a;
            color: #80d080;
            border-color: #3a8040;
        }

        #minimap {
            display: none;
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
        }
        #minimapCanvas {
            border-radius: 8px;
            border: 1px solid #4a3a20;
            display: block;
            background: rgba(15, 12, 8, 0.88);
        }
        #minimapLabel {
            text-align: center;
            font-size: 9px;
            letter-spacing: 1.5px;
            color: #8a7040;
            font-family: 'Courier New', monospace;
            margin-top: 3px;
            text-transform: uppercase;
        }

        #inventoryUI {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: min(90vw, 520px);
            background: rgba(15, 10, 5, 0.97);
            border: 2px solid #8a6030;
            border-radius: 14px;
            padding: 18px 20px;
            font-family: 'Courier New', monospace;
            color: #e8d8b0;
            display: none;
            z-index: 200;
            backdrop-filter: blur(6px);
            max-height: 70vh;
            overflow-y: auto;
        }
        #inventoryUI .inv-title {
            font-size: 14px;
            color: #d4a040;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        #inventoryUI .inv-sub {
            font-size: 11px;
            color: #a08050;
            margin-bottom: 10px;
        }
        #inventoryUI .inv-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        #inventoryUI .inv-bag {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 36px;
        }
        #inventoryUI .inv-btn {
            background: #1e1408;
            border: 1px solid #6a4820;
            color: #e8c880;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.15s;
        }
        #inventoryUI .inv-btn:hover {
            background: #3a2810;
        }
        #inventoryUI .inv-btn-bag {
            background: #0e1e08;
            border: 1px solid #3a6020;
            color: #a0e060;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        #inventoryUI .inv-btn-bag:hover {
            background: #1a2a10;
        }
        #inventoryUI .inv-close {
            margin-top: 14px;
            background: #2a1e08;
            border: 1px solid #8a6030;
            color: #d4b060;
            font-size: 11px;
            letter-spacing: 1px;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        #inventoryUI .inv-close:hover {
            background: #3a2a0a;
            color: #f0d080;
            border-color: #a07030;
        }
        #inventoryUI .inv-empty {
            color: #6a5a3a;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <!-- ====== CANVAS 3D ====== -->
    <canvas id="gc"></canvas>

    <!-- ====== BARRE DE BOUTONS HAUT ====== -->
    <div id="paramBar">
        <button class="pBtn" id="btnCoords" onclick="toggleCoords()"><span class="icon">📍</span>Coordonnées</button>
        <button class="pBtn" id="btnMap" onclick="toggleMap()"><span class="icon">🗺️</span>Carte</button>
        <button class="pBtn" id="btnFly" onclick="toggleFly()"><span class="icon">🪂</span>Vol</button>
        <button class="pBtn" id="btnCall" onclick="callAscenseur()"><span class="icon">📞</span>Appeler</button>
        <button class="pBtn" id="btnItem" onclick="toggleInventory()"><span class="icon">🎒</span>Objets</button>
    </div>

    <!-- ====== PANNEAU COORDONNÉES ====== -->
    <div id="coordPanel">
        <div class="coord-title">📍 Position 3D</div>
        <div>X : <span class="coord-val" id="cx">0.00</span></div>
        <div>Z : <span class="coord-val" id="cz">0.00</span></div>
        <div>Y : <span class="coord-val" id="cy">1.70</span></div>
        <button id="copyBtn" onclick="copyCoords()">⧉ COPIER</button>
    </div>

    <!-- ====== MINIMAP ====== -->
    <div id="minimap">
        <canvas id="minimapCanvas" width="180" height="180"></canvas>
        <div id="minimapLabel">Plan</div>
    </div>

    <!-- ====== HUD (joysticks + infos) ====== -->
    <div id="hud">
        <canvas id="jL" width="120" height="60"></canvas>
        <div id="info">
            ZQSD · avancer &nbsp;|&nbsp; clic-glisser · regarder<br />
            Couloir — 4 portes &amp; 6 cadres
        </div>
        <canvas id="jR" width="120" height="60"></canvas>
    </div>

    <!-- ====== TOAST ====== -->
    <div id="toast">✓ Sauvegardé</div>

    <!-- ====== INVENTAIRE ====== -->
    <div id="inventoryUI">
        <div class="inv-title">🎒 INVENTAIRE</div>
        <div class="inv-sub">Cliquez sur un objet pour le prendre.</div>
        <div id="invItemList" class="inv-items"></div>
        <div style="font-size:13px;color:#d4a040;font-weight:bold;margin-bottom:8px;margin-top:4px;">📦 Dans mon sac :</div>
        <div id="invBagList" class="inv-bag"></div>
        <button class="inv-close" onclick="toggleInventory()">✕ Fermer</button>
    </div>

    <!-- ====== BOUTON RETOUR ====== -->
    <button id="exitBtn" onclick="window.location.href='index.html'">🚪 Retour à la chambre</button>

    <!-- ====== THREE.JS ====== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

    <script>
        // ================================================================
        //  SCÈNE 3D DU CORRIDOR — 4 PORTES ÉGALEMENT ESPACÉES
        //  + 6 CADRES AVEC IMAGES (images/corridor1.png … corridor6.png)
        // ================================================================

        if (typeof THREE === 'undefined') {
            document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:40vh;">Erreur : Three.js ne s\'est pas chargé.</h1>';
            throw new Error('THREE not loaded');
        }

        const canvas = document.getElementById('gc');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setClearColor(0x1a1410);
        renderer.setSize(window.innerWidth, window.innerHeight - 70);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.4));

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x2a1a10, 18, 50);

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / (window.innerHeight - 70), 0.1, 80);
        camera.position.set(0, 1.7, 12.5);
        camera.lookAt(0, 1.5, 0);

        // ─── Lumières ──────────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x887868, 0.75);
        scene.add(ambient);

        const key = new THREE.DirectionalLight(0xffd8a0, 0.7);
        key.position.set(3, 10, 6);
        key.castShadow = true;
        key.shadow.mapSize.width = 1024;
        key.shadow.mapSize.height = 1024;
        key.shadow.camera.near = 0.1;
        key.shadow.camera.far = 40;
        scene.add(key);

        const fill = new THREE.DirectionalLight(0x8899bb, 0.4);
        fill.position.set(-4, 3, -5);
        scene.add(fill);

        // ─── Textures ──────────────────────────────────────────────────────
        function makeTex(fn, size) {
            size = size || 128;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            fn(c.getContext('2d'), size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            return t;
        }

        const floorTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#2a0606';
            ctx.fillRect(0, 0, s, s);
            const cell = s / 4;
            for (let r = 0; r < 4; r++) {
                for (let col = 0; col < 4; col++) {
                    const dark = (r + col) % 2 === 0;
                    ctx.fillStyle = dark ? '#7a0f10' : '#160303';
                    ctx.save();
                    ctx.translate(col * cell + cell / 2, r * cell + cell / 2);
                    ctx.rotate(Math.PI / 4);
                    const d = cell * 0.62;
                    ctx.fillRect(-d / 2, -d / 2, d, d);
                    ctx.restore();
                }
            }
            ctx.strokeStyle = 'rgba(180,120,40,0.25)';
            ctx.lineWidth = 1.2;
            for (let i = 0; i <= s; i += cell) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 128);
        floorTex.repeat.set(3, 14);

        const stoneTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#7a5a48';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < 60; i++) {
                const x = Math.random() * s,
                    y = Math.random() * s;
                const v = 90 + Math.random() * 35;
                ctx.fillStyle = 'rgb(' + (v + 20) + ',' + (v) + ',' + (v - 25) + ')';
                ctx.fillRect(x, y, 6 + Math.random() * 12, 6 + Math.random() * 10);
            }
            ctx.strokeStyle = 'rgba(100,80,60,0.2)';
            ctx.lineWidth = 1.5;
            for (let i = 0; i < s; i += 22) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(s, i);
                ctx.stroke();
            }
        }, 128);
        stoneTex.repeat.set(4, 2);

        const woodTex = makeTex(function(ctx, s) {
            ctx.fillStyle = '#3a1810';
            ctx.fillRect(0, 0, s, s);
            for (let i = 0; i < s; i += 3) {
                ctx.fillStyle = 'hsl(12,' + (30 + Math.random() * 15) + '%,' + (14 + Math.random() * 10) + '%)';
                ctx.fillRect(0, i, s, 2);
            }
        }, 64);

        // ─── Matériaux ────────────────────────────────────────────────────
        const mWall = new THREE.MeshLambertMaterial({ map: stoneTex, color: 0x9a6858 });
        const mFloor = new THREE.MeshLambertMaterial({ map: floorTex, color: 0xa06060 });
        const mCeil = new THREE.MeshLambertMaterial({ color: 0x2a1818 });
        const mDoor = new THREE.MeshLambertMaterial({ map: woodTex, color: 0x6a3a28 });
        const mDoorHi = new THREE.MeshLambertMaterial({ map: woodTex, color: 0xb06040, emissive: 0x551100,
            emissiveIntensity: 0.5 });
        const mPanel = new THREE.MeshLambertMaterial({ color: 0x5a1810 });
        const mFrame = new THREE.MeshLambertMaterial({ color: 0x201010 });
        const mGold = new THREE.MeshLambertMaterial({ color: 0xd4a840, emissive: 0x3a2600, emissiveIntensity: 0.3 });
        const mMetal = new THREE.MeshLambertMaterial({ color: 0x9aa0a8 });
        const mMetalDark = new THREE.MeshLambertMaterial({ color: 0x4a5058 });
        const mElevHi = new THREE.MeshLambertMaterial({ color: 0xc0c8d0, emissive: 0x223344, emissiveIntensity: 0.4 });
        const mDoorFrame = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });
        const mFrameGold = new THREE.MeshLambertMaterial({ color: 0xb89040, emissive: 0x2a1a00, emissiveIntensity: 0.15 });

        // Helpers
        function box(w, h, d, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        function plane(w, h, mat, x, y, z, rx, ry, rz) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            m.position.set(x, y, z);
            if (rx) m.rotation.x = rx;
            if (ry) m.rotation.y = ry;
            if (rz) m.rotation.z = rz;
            m.receiveShadow = true;
            scene.add(m);
            return m;
        }

        // ─── Dimensions du couloir ──────────────────────────────────────
        const WALL_H = 3.8;
        const HALL_W = 5;
        const HALL_LEN = 26;
        const Z_FAR = -HALL_LEN / 2;
        const Z_NEAR = HALL_LEN / 2;

        // Sol + plafond
        plane(HALL_W, HALL_LEN, mFloor, 0, 0, 0, -Math.PI / 2);
        plane(HALL_W, HALL_LEN, mCeil, 0, WALL_H, 0, Math.PI / 2);

        // Plinthes
        box(0.12, 0.35, HALL_LEN, mPanel, -HALL_W / 2 + 0.06, 0.17, 0);
        box(0.12, 0.35, HALL_LEN, mPanel, HALL_W / 2 - 0.06, 0.17, 0);

        // Murs latéraux
        plane(HALL_LEN, WALL_H, mWall, -HALL_W / 2, WALL_H / 2, 0, 0, Math.PI / 2);
        plane(HALL_LEN, WALL_H, mWall, HALL_W / 2, WALL_H / 2, 0, 0, -Math.PI / 2);

        // ─── MUR ARRIÈRE (Z_NEAR) AVEC PORTE INTERACTIVE ──────────────
        (function() {
            const doorW = 1.2,
                doorH = 2.2;
            const doorX = 0;
            const doorZ = Z_NEAR + 0.01;
            const yc = WALL_H / 2;

            const xMin = -HALL_W / 2,
                xMax = HALL_W / 2;
            const yMin = 0,
                yMax = WALL_H;

            // Colonne gauche
            box((xMin + (doorX - doorW / 2)) / 2 - xMin, WALL_H, 0.05, mWall, (xMin + (doorX - doorW / 2)) / 2, yc, doorZ);
            // Colonne droite
            box(xMax - (doorX + doorW / 2), WALL_H, 0.05, mWall, (doorX + doorW / 2 + xMax) / 2, yc, doorZ);
            // Bande au-dessus
            if (doorH < yMax) {
                box(HALL_W, yMax - doorH, 0.05, mWall, 0, (doorH + yMax) / 2, doorZ);
            }

            // Cadre
            const frameMat = mDoorFrame;
            box(0.08, doorH, 0.08, frameMat, doorX - doorW / 2 - 0.04, doorH / 2 + 0.025, doorZ);
            box(0.08, doorH, 0.08, frameMat, doorX + doorW / 2 + 0.04, doorH / 2 + 0.025, doorZ);
            box(doorW + 0.16, 0.08, 0.08, frameMat, doorX, doorH + 0.025 + 0.04, doorZ);

            // Pivot
            const pivot = new THREE.Group();
            pivot.position.set(doorX - doorW / 2, doorH / 2 + 0.025, doorZ);
            scene.add(pivot);

            const doorGroup = new THREE.Group();
            doorGroup.position.set(doorW / 2, 0, 0);

            const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(doorW, doorH, 0.04), mDoor);
            doorMesh.position.set(0, 0, 0);
            doorMesh.castShadow = true;
            doorMesh.receiveShadow = true;
            doorGroup.add(doorMesh);

            const handleMat = new THREE.MeshLambertMaterial({ color: 0xccaa88 });
            const handle = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 6), handleMat);
            handle.position.set(0.35, -0.2, 0.06);
            handle.castShadow = true;
            doorGroup.add(handle);
            const handleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.12, 6), handleMat);
            handleBase.rotation.x = Math.PI / 2;
            handleBase.position.set(0.35, -0.2, 0.04);
            doorGroup.add(handleBase);

            const clickArea = new THREE.Mesh(new THREE.PlaneGeometry(doorW * 1.2, doorH * 1.2),
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide }));
            clickArea.position.set(0, 0, 0.02);
            clickArea.userData.isClickArea = true;
            doorGroup.add(clickArea);

            pivot.add(doorGroup);

            window._backDoorPivot = pivot;
            window._backDoorGroup = doorGroup;
            window._backDoorMesh = doorMesh;
            window._backDoorMat = mDoor;
            window._backDoorHiMat = mDoorHi;
            window._backDoorOpen = false;
            window._backDoorAnimating = false;

            const light = new THREE.PointLight(0xff8844, 0.4, 5);
            light.position.set(0, doorH + 0.8, doorZ + 0.2);
            scene.add(light);
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 6),
                new THREE.MeshBasicMaterial({ color: 0xff8844 }));
            glow.position.copy(light.position);
            scene.add(glow);
        })();

        // ─── 4 PORTES DÉCORATIVES (également espacées) ──────────────────
        const clickables = [];

        function makeDoor(x, z, facingRight, doorColor) {
            const doorW = 1.25,
                doorH = 2.35,
                thick = 0.1;
            const g = new THREE.Group();
            const wallX = facingRight ? HALL_W / 2 - 0.02 : -HALL_W / 2 + 0.02;
            g.position.set(wallX, doorH / 2 + 0.02, z);
            g.rotation.y = facingRight ? -Math.PI / 2 : Math.PI / 2;

            const mFrameVar = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });
            const fL = new THREE.Mesh(new THREE.BoxGeometry(0.1, doorH + 0.3, 0.14), mFrameVar);
            fL.position.set(-doorW / 2 - 0.08, 0, 0);
            g.add(fL);
            const fR = new THREE.Mesh(new THREE.BoxGeometry(0.1, doorH + 0.3, 0.14), mFrameVar);
            fR.position.set(doorW / 2 + 0.08, 0, 0);
            g.add(fR);
            const fT = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.36, 0.16, 0.14), mFrameVar);
            fT.position.set(0, doorH / 2 + 0.15, 0);
            g.add(fT);

            const arch = new THREE.Mesh(new THREE.CylinderGeometry(doorW / 2 + 0.05, doorW / 2 + 0.05, 0.12, 16, 1, false, 0,
                Math.PI), mGold);
            arch.rotation.z = Math.PI;
            arch.rotation.x = Math.PI / 2;
            arch.position.set(0, doorH / 2 + 0.28, 0);
            g.add(arch);

            const mDoorVar = new THREE.MeshLambertMaterial({ color: doorColor });
            const mDoorHiVar = new THREE.MeshLambertMaterial({ color: doorColor, emissive: 0x664422,
                emissiveIntensity: 0.5 });
            const leaf = new THREE.Mesh(new THREE.BoxGeometry(doorW, doorH, thick), mDoorVar);
            leaf.castShadow = true;

            const mPanelVar = new THREE.MeshLambertMaterial({ color: 0x3a2a1a });
            [
                [0, 0.55],

                const pane = new THREE.Mesh(new THREE.BoxGeometry(doorW * 0.62, 0.5, 0.04), mPanelVar);

                for (let j = -1; j <= 1; j += 2) {
                    const stud = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), mGold);
                    stud.position.set(i * doorW * 0.33, j * doorH * 0.42, thick / 2 + 0.02);
                    g.add(stud);
                }
            }

            const handle = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 8), mGold);
            handle.position.set(doorW / 2 - 0.18, -0.15, thick / 2 + 0.06);
            g.add(handle);
            const hb = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.1, 8), mGold);
            hb.rotation.x = Math.PI / 2;
            hb.position.set(doorW / 2 - 0.18, -0.15, thick / 2 + 0.02);
            g.add(hb);

            const sconce = new THREE.PointLight(doorColor, 0.6, 6);
            sconce.position.set(wallX + (facingRight ? -0.4 : 0.4), doorH + 0.6, z);
            scene.add(sconce);
            const glowMat = new THREE.MeshBasicMaterial({ color: doorColor });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 6), glowMat);
            glow.position.copy(sconce.position);
            scene.add(glow);

            scene.add(g);
            clickables.push({ mesh: leaf, base: mDoorVar, hi: mDoorHiVar, type: 'door' });
        }

        // 4 portes à intervalles réguliers : z = -7.5, -2.5, 2.5, 7.5
        // alternance gauche / droite
        const doorPositions = [
            { z: -7.5, facingRight: false, color: 0x8a4a2a },
            { z: -2.5, facingRight: true, color: 0x6a3a5a },
            { z: 2.5, facingRight: false, color: 0x5a5a3a },
            { z: 7.5, facingRight: true, color: 0x7a4a4a }
        ];
        doorPositions.forEach(function(d) {

        // ─── 6 CADRES AVEC IMAGES (entre les portes) ─────────────────────
        // Positions des cadres : 2 dans chaque intervalle entre les 4 portes
        // Intervalles : [-7.5, -2.5] , [-2.5, 2.5] , [2.5, 7.5]

        const framePositions = [
            { z: -7.5 + 5 / 3, facingRight: false, idx: 1 }, // -5.83
            { z: -7.5 + 10 / 3, facingRight: true, idx: 2 }, // -4.17
            { z: -2.5 + 5 / 3, facingRight: false, idx: 3 }, // -0.83
            { z: -2.5 + 10 / 3, facingRight: true, idx: 4 }, // 0.83

        // ================================================================
        //  FONCTION DE FALLBACK (définie avant utilisation)
        // ================================================================
        function generateFallbackTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 256, 256);
            grad.addColorStop(0, '#8a7a5a');
            grad.addColorStop(1, '#5a4a2a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#d4a840';
            ctx.lineWidth = 12;
            ctx.strokeRect(20, 20, 216, 216);
            ctx.fillStyle = '#d4a840';
            ctx.font = '80px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎨', 128, 130);
            return new THREE.CanvasTexture(canvas);
        }

        // ================================================================
        //  CADRES REDUITS DE MOITIÉ (0.8 x 1.0) ET TRÈS ÉLOIGNÉS DU MUR
        // ================================================================
        function makePictureFrame(z, facingRight, imageIndex) {
            // Dimensions réduites de moitié par rapport à la version doublée
            const frameW = 0.8;      // moitié de 1.6
            const frameH = 1.0;      // moitié de 2.0
            const borderW = 0.02;    // bordure proportionnelle
            const depth = 0.12;      // profondeur pour bien voir le cadre

            const group = new THREE.Group();
            // Mur à X = +/-2.5. On décale de 0.6 vers l'intérieur
            const wallX = facingRight ? HALL_W / 2 - 0.02 : -HALL_W / 2 + 0.02;
            const offsetX = facingRight ? -0.1 : 0.1;  // décalage important
            group.position.set(wallX + offsetX, 1.7, z); // Y centré (0.5+1.2)
            group.rotation.y = facingRight ? -Math.PI / 2 : Math.PI / 2;

            // On ne crée PAS de fond pour éviter tout z-fighting

            // Image (plan unique)
            const imgMat = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                polygonOffset: true,
                polygonOffsetFactor: -1,
                polygonOffsetUnits: -1
            });
            const imageMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(frameW - borderW * 2.4, frameH - borderW * 2.4),
                imgMat
            );
            imageMesh.position.set(0, 0, depth * 0.2);
            group.add(imageMesh);

            // Chargement de l'image
            const imgUrl = 'images/corridor' + imageIndex + '.png';
            const loader = new THREE.TextureLoader();
            loader.load(imgUrl,
                function(tex) {
                    imageMesh.material = new THREE.MeshLambertMaterial({
                        map: tex,
                        polygonOffset: true,
                        polygonOffsetFactor: -1,
                        polygonOffsetUnits: -1
                    });
                    imageMesh.material.needsUpdate = true;
                },
                undefined,
                function() {
                    const fallbacks = ['images/corridor' + imageIndex + '.jpg', 'images/corridor' + imageIndex + '.webp'];
                    let tried = 0;

                    function tryFallback() {
                        if (tried >= fallbacks.length) {
                            imageMesh.material = new THREE.MeshLambertMaterial({
                                map: generateFallbackTexture(),
                                polygonOffset: true,
                                polygonOffsetFactor: -1,
                                polygonOffsetUnits: -1
                            });
                            return;
                        }
                        const fLoader = new THREE.TextureLoader();
                        fLoader.load(fallbacks[tried],
                            function(tex) {
                                imageMesh.material = new THREE.MeshLambertMaterial({
                                    map: tex,
                                    polygonOffset: true,
                                    polygonOffsetFactor: -1,
                                    polygonOffsetUnits: -1
                                });
                                imageMesh.material.needsUpdate = true;
                            },
                            undefined,
                            function() {
                                tried++;
                                tryFallback();
                            }
                        );
                    }
                    tryFallback();
                }
            );

            // Bordure du cadre (4 baguettes)
            const bMat = mFrameGold;
            const top = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.04, borderW, depth * 0.8), bMat);
            top.position.set(0, frameH / 2 - borderW / 2, 0);
            group.add(top);
            const bot = new THREE.Mesh(new THREE.BoxGeometry(frameW + 0.04, borderW, depth * 0.8), bMat);
            bot.position.set(0, -frameH / 2 + borderW / 2, 0);
            group.add(bot);
            const left = new THREE.Mesh(new THREE.BoxGeometry(borderW, frameH - borderW * 2, depth * 0.8), bMat);
            left.position.set(-frameW / 2 + borderW / 2, 0, 0);
            group.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(borderW, frameH - borderW * 2, depth * 0.8), bMat);
            right.position.set(frameW / 2 - borderW / 2, 0, 0);
            group.add(right);

            // Ornements d'angle (proportionnés)
            const dotMat = new THREE.MeshLambertMaterial({ color: 0xd4a840, emissive: 0x3a2600, emissiveIntensity: 0.2 });
            const corners = [
                [-frameW / 2 + borderW * 0.6, frameH / 2 - borderW * 0.6],
                [frameW / 2 - borderW * 0.6, frameH / 2 - borderW * 0.6],
                [-frameW / 2 + borderW * 0.6, -frameH / 2 + borderW * 0.6],
                [frameW / 2 - borderW * 0.6, -frameH / 2 + borderW * 0.6]
            ];
            corners.forEach(function(p) {
                const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 4), dotMat);
                dot.position.set(p[0], p[1], depth * 0.5);
                group.add(dot);
            });

            scene.add(group);
        }

        // Création des 6 cadres
        framePositions.forEach(function(f) {
            makePictureFrame(f.z, f.facingRight, f.idx);
        });

        // ─── ASCENSEUR AVEC PORTES COULISSANTES ──────────────────────
        let elevatorOpen = false;
        let elevatorOpening = false;
        let elevatorDoors = [];
        let elevatorInitX = [];
        let doorSlideDist = 0;

        (function() {
            const ez = Z_FAR + 0.15;
            plane(HALL_W, WALL_H, mWall, 0, WALL_H / 2, Z_FAR, 0, 0);

            const ew = 2.4,
                eh = 2.9;
            box(ew + 0.5, 0.28, 0.16, mMetalDark, 0, eh + 0.14, ez);
            box(0.28, eh + 0.28, 0.16, mMetalDark, -ew / 2 - 0.14, eh / 2, ez);
            box(0.28, eh + 0.28, 0.16, mMetalDark, ew / 2 + 0.14, eh / 2, ez);

            const leafW = ew / 2 - 0.01;

            const dL = new THREE.Mesh(new THREE.BoxGeometry(leafW, eh, doorDepth), mMetal);
            dL.position.set(-leafW / 2 - 0.005, eh / 2, ez + 0.05);
            dL.castShadow = true;
            dL.receiveShadow = true;

            dR.castShadow = true;
            dR.receiveShadow = true;
            scene.add(dR);

            box(0.04, eh, 0.09, mMetalDark, 0, eh / 2, ez + 0.06);

            const disp = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.28, 0.06),
                new THREE.MeshBasicMaterial({ color: 0xff3020 }));
            disp.position.set(0, eh + 0.45, ez + 0.06);
            scene.add(disp);

            const btnPlate = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.4, 0.05), mMetalDark);
            btnPlate.position.set(ew / 2 + 0.34, 1.15, ez + 0.06);
            scene.add(btnPlate);
            const btnUp = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 0.04, 12), mGold);
            btnUp.rotation.x = Math.PI / 2;
            btnUp.position.set(ew / 2 + 0.34, 1.24, ez + 0.09);
            btnUp.userData.isElevatorButton = true;
            scene.add(btnUp);

            const el = new THREE.PointLight(0x88aaff, 0.6, 8);
            el.position.set(0, 2.4, ez + 1.5);
            scene.add(el);

            elevatorDoors = [dL, dR];
            elevatorInitX = [-leafW / 2 - 0.005, leafW / 2 + 0.005];
            doorSlideDist = leafW + 0.3;

            window._elevatorButton = btnUp;
        })();

        // ─── Lampes de plafond ──────────────────────────────────────────
        for (let z = -9; z <= 9; z += 6) {
            const pl = new THREE.PointLight(0xffd8b0, 0.5, 9);
            pl.position.set(0, WALL_H - 0.4, z);
            scene.add(pl);
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), new THREE.MeshBasicMaterial({ color: 0xffe0b0 }));
            b.position.set(0, WALL_H - 0.35, z);
            scene.add(b);
        }

        // ================================================================
        //  INTERFACE UTILISATEUR
        // ================================================================

        let camYaw = Math.PI,
            camPitch = 0.05;
        let mdown = false,
            lmx = 0,
            lmy = 0;
        const keys = {};

        document.addEventListener('keydown', function(e) {
            keys[e.key.toLowerCase()] = true;
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].indexOf(e.key.toLowerCase()) !== -1) e
                .preventDefault();
        });
        document.addEventListener('keyup', function(e) { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', function(e) { mdown = true;
            lmx = e.clientX;
            lmy = e.clientY;
            canvas.style.cursor = 'grabbing'; });
        document.addEventListener('mouseup', function() { mdown = false;
            canvas.style.cursor = 'default'; });
        document.addEventListener('mousemove', function(e) {
            if (!mdown) return;
            camYaw -= (e.clientX - lmx) * 0.004;
            camPitch -= (e.clientY - lmy) * 0.003;
            camPitch = Math.max(-0.5, Math.min(0.6, camPitch));
            lmx = e.clientX;
            lmy = e.clientY;
        });

        // ─── Raycaster ──────────────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hover = null;
        let hoverBackDoor = false;
        let backDoorHighlighted = false;
        let hoverElevatorButton = false;

        function updateInteractions(event) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // Porte arrière
            const pivot = window._backDoorPivot;
            if (pivot) {
                const doorGroup = window._backDoorGroup;
                const meshes = [];
                doorGroup.children.forEach(child => {
                    if (child.isMesh && (child === window._backDoorMesh || child.userData.isClickArea)) {
                        meshes.push(child);
                    }
                });
                const intersects = raycaster.intersectObjects(meshes);
                if (intersects.length > 0 && !window._backDoorOpen) {
                    canvas.style.cursor = 'pointer';
                    if (!backDoorHighlighted) {
                        window._backDoorMesh.material = mDoorHi;
                        backDoorHighlighted = true;
                    }
                    hoverBackDoor = true;
                } else {
                    if (backDoorHighlighted) {
                        window._backDoorMesh.material = mDoor;
                        backDoorHighlighted = false;
                    }
                    hoverBackDoor = false;
                }
            }

            // Bouton ascenseur
            const btn = window._elevatorButton;
            if (btn) {
                const intersects = raycaster.intersectObject(btn);
                if (intersects.length > 0) {
                    canvas.style.cursor = 'pointer';
                    hoverElevatorButton = true;
                    btn.material.color.setHex(0xffaa44);
                } else {
                    if (hoverElevatorButton) {
                        btn.material.color.setHex(0xd4a840);
                        hoverElevatorButton = false;
                    }
                }
            }

            // Portes latérales
            const meshes = clickables.map(c => c.mesh);
            const hits = raycaster.intersectObjects(meshes);
            let newHover = null;
            if (hits.length && hits[0].distance < 12) {
                newHover = clickables.find(c => c.mesh === hits[0].object) || null;
            }
            if (newHover !== hover) {
                if (hover) hover.mesh.material = hover.base;
                if (newHover) newHover.mesh.material = newHover.hi;
                hover = newHover;
            }
            if (!hoverBackDoor && !hover && !hoverElevatorButton) {
                canvas.style.cursor = 'crosshair';
            }
        }

        canvas.addEventListener('mousemove', function(event) {
            if (mdown) return;
            updateInteractions(event);
        });

        canvas.addEventListener('click', function() {
            if (mdown) return;
            if (hoverBackDoor && !window._backDoorOpen && !window._backDoorAnimating) {
                openBackDoor();
                return;
            }
            if (hoverElevatorButton && !elevatorOpening) {
                openElevator();
                return;
            }
            if (hover) {
                if (hover.type === 'door') {
                    showToast('🔒 Cette porte est verrouillée.');
                }
            }
        });

        // ─── Ouverture porte arrière ──────────────────────────────────
        function openBackDoor() {
            if (window._backDoorOpen || window._backDoorAnimating) return;
            window._backDoorAnimating = true;
            showToast('🚪 La porte s\'ouvre vers la chambre…');

            const pivot = window._backDoorPivot;
            const targetAngle = -Math.PI / 2;
            const duration = 800;
            const startTime = performance.now();
            const startRot = 0;

            function animateDoor(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const currentAngle = startRot + (targetAngle - startRot) * eased;
                pivot.rotation.y = currentAngle;

                if (progress < 1) {
                    requestAnimationFrame(animateDoor);
                } else {
                    pivot.rotation.y = targetAngle;
                    window._backDoorOpen = true;
                    window._backDoorAnimating = false;
                    setTimeout(function() {
                        window.location.href = 'index.html?from=corridor';
                    }, 500);
                }
            }
            requestAnimationFrame(animateDoor);
        }

        // ─── Joysticks ──────────────────────────────────────────────────
        let jLx = 0,
            jLy = 0,
            jRx = 0,
            jRy = 0;

        function setupJoy(id, onMove) {
            const cv = document.getElementById(id);
            let active = false,
                ox = 0,
                oy = 0;

            function s(x, y) { active = true;
                ox = x;
                oy = y; }

            function mv(x, y) {
                if (!active) return;
                let dx = (x - ox) / 45,
                    dy = (y - oy) / 22;
                const mg = Math.sqrt(dx * dx + dy * dy);
                if (mg > 1) { dx /= mg;
                    dy /= mg; }
                onMove(dx, dy);
            }

            function e() { active = false;
                onMove(0, 0); }
            cv.addEventListener('mousedown', function(ev) { const r = cv.getBoundingClientRect();
                s(ev.clientX - r.left, ev.clientY - r.top); });
            document.addEventListener('mousemove', function(ev) { if (active) { const r = cv.getBoundingClientRect();
                    mv(ev.clientX - r.left, ev.clientY - r.top); } });
            document.addEventListener('mouseup', e);
            cv.addEventListener('touchstart', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                s(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchmove', function(ev) { ev.preventDefault(); const t = ev.touches[0]; const r = cv
                    .getBoundingClientRect();
                mv(t.clientX - r.left, t.clientY - r.top); }, { passive: false });
            cv.addEventListener('touchend', e);
        }
        setupJoy('jL', function(dx, dy) { jLx = dx;
            jLy = dy; });
        setupJoy('jR', function(dx, dy) { jRx = dx;
            jRy = dy; });

        function drawJoy(id, dx, dy) {
            const cv = document.getElementById(id);
            const x2 = cv.getContext('2d');
            const W = 120,
                H = 60;
            x2.clearRect(0, 0, W, H);
            x2.fillStyle = '#1e1e1e';
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#444';
            x2.lineWidth = 1.5;
            x2.beginPath();
            x2.ellipse(W / 2, H / 2, 56, 26, 0, 0, Math.PI * 2);
            x2.stroke();
            const nx = W / 2 + dx * 38,
                ny = H / 2 + dy * 16;
            const g2 = x2.createRadialGradient(nx - 2, ny - 2, 1, nx, ny, 13);
            g2.addColorStop(0, '#888');
            g2.addColorStop(1, '#2a2a2a');
            x2.fillStyle = g2;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.fill();
            x2.strokeStyle = '#111';
            x2.lineWidth = 1;
            x2.beginPath();
            x2.ellipse(nx, ny, 15, 10, 0, 0, Math.PI * 2);
            x2.stroke();
        }

        // ─── Boutons ──────────────────────────────────────────────────────
        let showCoords = false,
            showMap = false,
            flyMode = false,
            flySpeed = 8;

        function toggleCoords() {
            showCoords = !showCoords;
            document.getElementById('coordPanel').style.display = showCoords ? 'block' : 'none';
            document.getElementById('btnCoords').classList.toggle('active', showCoords);
        }

        function toggleMap() {
            showMap = !showMap;
            document.getElementById('minimap').style.display = showMap ? 'block' : 'none';
            document.getElementById('btnMap').classList.toggle('active', showMap);
            if (showMap) drawMinimap();

        function toggleFly() {
            flyMode = !flyMode;
            const btn = document.getElementById('btnFly');
            btn.classList.toggle('active', flyMode);
            btn.innerHTML = flyMode ? '<span class="icon">🪂</span>Vol ON' : '<span class="icon">🪂</span>Vol';
            if (!flyMode) camera.position.y = 1.7;
        }

        function copyCoords() {
            const x = camera.position.x.toFixed(2),
                y = camera.position.y.toFixed(2),
                z = camera.position.z.toFixed(2);
            const txt = 'X:' + x + ' Y:' + y + ' Z:' + z;
            const doToast = function() {
                showToast('✓ ' + txt + ' copié !');
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ COPIÉ !';
                btn.classList.add('copied');
                setTimeout(function() { btn.textContent = '⧉ COPIER';
                    btn.classList.remove('copied'); }, 2000);
            };
            if (navigator.clipboard) {
                navigator.clipboard.writeText(txt).then(doToast).catch(function() {
                    const el = document.createElement('textarea');
                    el.value = txt;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    doToast();
                });
            } else {
                const el = document.createElement('textarea');
                el.value = txt;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                doToast();
            }
        }

        function updateCoordDisplay() {
            if (!showCoords) return;
            document.getElementById('cx').textContent = camera.position.x.toFixed(2);
            document.getElementById('cz').textContent = camera.position.z.toFixed(2);
            document.getElementById('cy').textContent = camera.position.y.toFixed(2);
        }

        function drawMinimap() {
            if (!showMap) return;
            const mc = document.getElementById('minimapCanvas');
            const ctx = mc.getContext('2d');
            const W = 180,
                H = 180;
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#1a1408';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#4a3828';
            ctx.fillRect(72, 14, 36, 152);
            ctx.fillStyle = '#6a5848';
            ctx.fillRect(78, 20, 24, 140);

            // 4 portes (positions z : -7.5, -2.5, 2.5, 7.5)
            ctx.fillStyle = '#d4a840';
            const doorZ = [-7.5, -2.5, 2.5, 7.5];
            doorZ.forEach(function(z) {
                const t = (z + 13) / 24;
                const py = 14 + (1 - t) * 152;
                ctx.fillRect(64, py - 7, 8, 14);
                ctx.fillRect(108, py - 7, 8, 14);
            });

            // 6 cadres (positions z : -5.83, -4.17, -0.83, 0.83, 4.17, 5.83)
            ctx.fillStyle = '#b89040';
            const frameZ = [-5.83, -4.17, -0.83, 0.83, 4.17, 5.83];
            frameZ.forEach(function(z) {
                const t = (z + 13) / 24;
                const py = 14 + (1 - t) * 152;
                ctx.fillRect(70, py - 5, 4, 10);
                ctx.fillRect(106, py - 5, 4, 10);
            });

            // Ascenseur
            ctx.fillStyle = '#9aa0a8';
            ctx.fillRect(78, 8, 24, 6);
            // Porte arrière
            ctx.fillStyle = '#8a4a2a';
            ctx.fillRect(84, 14, 12, 14);

            // Joueur
            const t = (camera.position.z + 13) / 24;
            const py = 14 + (1 - t) * 152;
            const px = 90 + (camera.position.x / (HALL_W / 2)) * 18;
            ctx.fillStyle = '#ff5020';
            ctx.beginPath();
            ctx.moveTo(px, py - 8);
            ctx.lineTo(px - 5, py + 5);
            ctx.lineTo(px + 5, py + 5);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#6a5020';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(1, 1, W - 2, H - 2);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        // ─── Appeler ascenseur ──────────────────────────────────────────
        function callAscenseur() {
            if (!elevatorOpening) {
                openElevator();
            }
        }

        // ─── Animation ascenseur ────────────────────────────────────────
        function openElevator() {
            if (elevatorOpening || elevatorOpen) return;
            elevatorOpening = true;
            showToast('🛗 L\'ascenseur s\'ouvre…');

            const doors = elevatorDoors;
            const initX = elevatorInitX;
            const slideDist = doorSlideDist;
            const duration = 1000;
            const startTime = performance.now();

            function animateOpen(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 2.5);
                const slide = eased * slideDist;
                doors[0].position.x = initX[0] - slide;
                doors[1].position.x = initX[1] + slide;

                if (progress < 1) {
                    requestAnimationFrame(animateOpen);
                } else {
                    doors[0].position.x = initX[0] - slideDist;
                    doors[1].position.x = initX[1] + slideDist;
                    elevatorOpen = true;
                    elevatorOpening = false;
                    setTimeout(function() {
                        closeElevatorAndRedirect();
                    }, 2000);
                }
            }
            requestAnimationFrame(animateOpen);
        }

        function closeElevatorAndRedirect() {
            if (!elevatorOpen || elevatorOpening) return;
            elevatorOpening = true;
            showToast('🛗 Fermeture…');

            const doors = elevatorDoors;
            const initX = elevatorInitX;
            const slideDist = doorSlideDist;
            const duration = 800;
            const startTime = performance.now();

            function animateClose(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 2.5);
                const slide = (1 - eased) * slideDist;
                doors[0].position.x = initX[0] - slide;
                doors[1].position.x = initX[1] + slide;

                if (progress < 1) {
                    requestAnimationFrame(animateClose);
                } else {
                    doors[0].position.x = initX[0];
                    doors[1].position.x = initX[1];
                    elevatorOpen = false;
                    elevatorOpening = false;
                    window.location.href = 'ascenseur.html?floor=2';
                }
            }
            requestAnimationFrame(animateClose);
        }

        // ─── INVENTAIRE ──────────────────────────────────────────────────
        const playerInventory = [];
        const ITEMS_AVAILABLE = [
            { id: 'crayon', name: '✏️ Crayon', desc: 'Un crayon HB bien taillé.' },
            { id: 'gomme', name: '🧹 Gomme', desc: 'Une gomme blanche.' },
            { id: 'regle', name: '📏 Règle', desc: 'Règle graduée de 30 cm.' },
            { id: 'cahier', name: '📓 Cahier', desc: 'Cahier de cours ligné.' },
            { id: 'livre', name: '📚 Manuel', desc: 'Manuel de mathématiques.' },
            { id: 'lampe', name: '🔦 Lampe', desc: 'Lampe torche à piles.' },
            { id: 'cle', name: '🗝️ Clé', desc: 'Une vieille clé rouillée.' },
            { id: 'portable', name: '📱 Téléphone', desc: 'Pas de réseau ici.' },
        ];
        let invOpen = false;

        function toggleInventory() {
            invOpen = !invOpen;
            document.getElementById('inventoryUI').style.display = invOpen ? 'block' : 'none';
            document.getElementById('btnItem').classList.toggle('active', invOpen);
            if (invOpen) renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('invItemList');
            const bag = document.getElementById('invBagList');
            list.innerHTML = '';
            bag.innerHTML = '';

            ITEMS_AVAILABLE.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'inv-btn';
                btn.textContent = item.name;
                btn.title = item.desc;
                btn.onclick = () => {
                    playerInventory.push({ ...item });
                    showToast('✓ ' + item.name + ' ajouté !');
                    renderInventory();
                };
                list.appendChild(btn);
            });

            if (playerInventory.length === 0) {
                const span = document.createElement('span');
                span.className = 'inv-empty';
                span.textContent = 'Sac vide';
                bag.appendChild(span);
            } else {
                playerInventory.forEach((item, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'inv-btn-bag';
                    btn.textContent = item.name + ' ✕';
                    btn.onclick = () => { playerInventory.splice(i, 1);
                        renderInventory(); };
                    bag.appendChild(btn);
                });
            }
        }

        // ================================================================
        //  BOUCLE PRINCIPALE
        // ================================================================

        let lastTime = 0;
        const SPEED = 4.5;

        function loop(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            let fx = 0,
                fz = 0;
            if (keys['z'] || keys['arrowup']) fz = 1;
            if (keys['s'] || keys['arrowdown']) fz = -1;
            if (keys['q'] || keys['arrowleft']) fx = -1;
            if (keys['d'] || keys['arrowright']) fx = 1;
            fx += jLx;
            fz -= jLy;

            if (jRx !== 0) camYaw -= jRx * 0.12;

            if (flyMode) {
                if (jRy !== 0) camera.position.y -= flySpeed * dt * jRy;
                camera.position.y = Math.max(0.5, Math.min(20, camera.position.y));
            } else {
                if (jRy !== 0) {
                    camPitch += jRy * 2 * dt;
                    camPitch = Math.max(-0.5, Math.min(0.6, camPitch));
                }
                camera.position.y = 1.7;
            }

            const cos = Math.cos(camYaw),
                sin = Math.sin(camYaw);
            camera.position.x += (-fx * cos + fz * sin) * SPEED * dt;
            camera.position.z += (fx * sin + fz * cos) * SPEED * dt;

            const mX = 0.7,
                mZ = 0.7;
            camera.position.x = Math.max(-HALL_W / 2 + mX, Math.min(HALL_W / 2 - mX, camera.position.x));
            camera.position.z = Math.max(Z_FAR + mZ, Math.min(Z_NEAR - mZ, camera.position.z));

            updateCoordDisplay();
            if (showMap) drawMinimap();

            const dir = new THREE.Vector3(
                Math.sin(camYaw) * Math.cos(camPitch),
                -Math.sin(camPitch),
                Math.cos(camYaw) * Math.cos(camPitch)
            );
            camera.lookAt(camera.position.x + dir.x, camera.position.y + dir.y, camera.position.z + dir.z);

            renderer.render(scene, camera);
            drawJoy('jL', jLx, jLy);
            drawJoy('jR', jRx, jRy);
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', function() {
            const w = window.innerWidth,
                h = window.innerHeight - 70;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        });

        renderInventory();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
